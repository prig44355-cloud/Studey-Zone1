<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محتويات المحاضرة الأولى | المنصة التعليمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f0f4f8; --text-main: #1e293b; --header-bg: #ffffff;
            --card-active: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); 
            --card-locked: linear-gradient(135deg, #e2ebf0 0%, #cfd9df 100%);
            --text-locked: #475569; --icon-color: #84fab0; 
        }
        [data-theme="dark"] {
            --bg-body: #05071b; --text-main: #f8fafc; --header-bg: #05071b;
            --card-active: linear-gradient(135deg, #065f46 0%, #064e3b 100%);
            --card-locked: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --text-locked: #94a3b8; --icon-color: #84fab0; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
        body { background: var(--bg-body); color: var(--text-main); min-height: 100vh; overflow-x: hidden; -webkit-user-select: none; user-select: none; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--header-bg); padding: 15px 5%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 15px; }
        .page-title { font-size: 1.5rem; font-weight: 900; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
        .header-actions { display: flex; align-items: center; gap: 15px; }

        .cta-back { display: flex; align-items: center; justify-content: center; padding: 8px 25px; text-decoration: none; font-size: 18px; font-weight: bold; color: white; background: #6225e6; transition: 1s; box-shadow: -5px 5px 0 var(--text-main); transform: skewX(15deg); border: none; cursor: pointer; }
        [data-theme="dark"] .cta-back { background: var(--icon-color); color: #1e293b; box-shadow: -5px 5px 0 #ffffff; }
        .cta-back:focus { outline: none; } .cta-back:hover { transition: 0.5s; box-shadow: -8px 8px 0 #fbc638; }
        .cta-back .span { transform: skewX(-15deg); font-family: 'Cairo'; }
        .cta-back .second { transition: 0.5s; margin-left: 0; margin-right: 15px; width: 25px; transform: rotate(180deg); display: flex; align-items: center;}
        .cta-back:hover .second { transition: 0.5s; margin-right: 35px; }
        .one { transition: 0.4s; transform: translateX(-60%); } .two { transition: 0.5s; transform: translateX(-30%); }
        .cta-back:hover .three { animation: color_anim 1s infinite 0.2s; }
        .cta-back:hover .one { transform: translateX(0%); animation: color_anim 1s infinite 0.6s; }
        .cta-back:hover .two { transform: translateX(0%); animation: color_anim 1s infinite 0.4s; }
        @keyframes color_anim { 0% { fill: white; } 50% { fill: #fbc638; } 100% { fill: white; } }

        .theme-btn-wrapper { transform: scale(0.65); transform-origin: center right;} html[dir="ltr"] .theme-btn-wrapper { transform-origin: center left; }
        .toggleWrapper { overflow: hidden; color: white; display: flex; align-items: center;}
        .toggleWrapper .input-theme { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
        .toggle { cursor: pointer; display: inline-block; position: relative; width: 90px; height: 50px; background-color: #83d8ff; border-radius: 84px; transition: background-color 200ms cubic-bezier(0.445, 0.05, 0.55, 0.95); }
        .toggle:before { content: "AM"; position: absolute; left: -50px; top: 15px; font-size: 18px; color: #749ed7; font-weight: bold;}
        .toggle:after { content: "PM"; position: absolute; right: -48px; top: 15px; font-size: 18px; color: var(--text-main); font-weight: bold;}
        .toggle__handler { display: inline-block; position: relative; z-index: 1; top: 3px; left: 3px; width: 44px; height: 44px; background-color: #ffcf96; border-radius: 50px; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3); transition: all 400ms cubic-bezier(0.68, -0.55, 0.265, 1.55); transform: rotate(-45deg); }
        .toggle__handler .crater { position: absolute; background-color: #e8cda5; opacity: 0; transition: opacity 200ms ease-in-out; border-radius: 100%; }
        .toggle__handler .crater--1 { top: 18px; left: 10px; width: 4px; height: 4px; } .toggle__handler .crater--2 { top: 28px; left: 22px; width: 6px; height: 6px; } .toggle__handler .crater--3 { top: 10px; left: 25px; width: 8px; height: 8px; }
        .star { position: absolute; background-color: #fff; transition: all 300ms cubic-bezier(0.445, 0.05, 0.55, 0.95); border-radius: 50%; }
        .star--1 { top: 10px; left: 35px; z-index: 0; width: 30px; height: 3px; } .star--2 { top: 18px; left: 28px; z-index: 1; width: 30px; height: 3px; } .star--3 { top: 27px; left: 40px; z-index: 0; width: 30px; height: 3px; }
        .star--4, .star--5, .star--6 { opacity: 0; transition: all 300ms 0 cubic-bezier(0.445, 0.05, 0.55, 0.95); }
        .star--4 { top: 16px; left: 11px; z-index: 0; width: 2px; height: 2px; transform: translate3d(3px, 0, 0); } .star--5 { top: 32px; left: 17px; z-index: 0; width: 3px; height: 3px; transform: translate3d(3px, 0, 0); } .star--6 { top: 36px; left: 28px; z-index: 0; width: 2px; height: 2px; transform: translate3d(3px, 0, 0); }
        .input-theme:checked + .toggle { background-color: #749dd6; } .input-theme:checked + .toggle:before { color: var(--text-main); } .input-theme:checked + .toggle:after { color: #749ed7; }
        .input-theme:checked + .toggle .toggle__handler { background-color: #ffe5b5; transform: translate3d(40px, 0, 0) rotate(0); } .input-theme:checked + .toggle .toggle__handler .crater { opacity: 1; }
        .input-theme:checked + .toggle .star--1 { width: 2px; height: 2px; } .input-theme:checked + .toggle .star--2 { width: 4px; height: 4px; transform: translate3d(-5px, 0, 0); } .input-theme:checked + .toggle .star--3 { width: 2px; height: 2px; transform: translate3d(-7px, 0, 0); }
        .input-theme:checked + .toggle .star--4, .input-theme:checked + .toggle .star--5, .input-theme:checked + .toggle .star--6 { opacity: 1; transform: translate3d(0, 0, 0); }

        .lang-btn-wrapper { transform: scale(0.60); transform-origin: center right;} html[dir="ltr"] .lang-btn-wrapper { transform-origin: center left; }
        .type--C { --line_color: var(--text-main); --back_color: #defffa; } [data-theme="dark"] .type--C { --line_color: #ffffff; --back_color: #1e3a8a; }
        .button { position: relative; z-index: 0; width: 140px; height: 45px; text-decoration: none; font-size: 16px; font-weight: bold; color: var(--line_color); letter-spacing: 2px; transition: all 0.3s ease; display: inline-block; cursor: pointer; }
        .button__text { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; font-family: 'Cairo'; font-weight: 900;}
        .button::before, .button::after, .button__text::before, .button__text::after { content: ""; position: absolute; height: 3px; border-radius: 2px; background: var(--line_color); transition: all 0.5s ease; }
        .button::before { top: 0; left: 54px; width: calc(100% - 56px * 2 - 16px); } .button::after { top: 0; right: 54px; width: 8px; }
        .button__text::before { bottom: 0; right: 54px; width: calc(100% - 56px * 2 - 16px); } .button__text::after { bottom: 0; left: 54px; width: 8px; }
        .button__line { position: absolute; top: 0; width: 56px; height: 100%; overflow: hidden; }
        .button__line::before { content: ""; position: absolute; top: 0; width: 150%; height: 100%; box-sizing: border-box; border-radius: 300px; border: solid 3px var(--line_color); }
        .button__line:nth-child(1), .button__line:nth-child(1)::before { left: 0; } .button__line:nth-child(2), .button__line:nth-child(2)::before { right: 0; }
        .button:hover { letter-spacing: 4px; } .button:hover::before, .button:hover .button__text::before { width: 8px; } .button:hover::after, .button:hover .button__text::after { width: calc(100% - 56px * 2 - 16px); }
        .button__drow1, .button__drow2 { position: absolute; z-index: -1; border-radius: 16px; transform-origin: 16px 16px; }
        .button__drow1 { top: -16px; left: 40px; width: 32px; height: 0; transform: rotate(30deg); } .button__drow2 { top: 44px; left: 77px; width: 32px; height: 0; transform: rotate(-127deg); }
        .button__drow1::before, .button__drow1::after, .button__drow2::before, .button__drow2::after { content: ""; position: absolute; }
        .button__drow1::before { bottom: 0; left: 0; width: 0; height: 32px; border-radius: 16px; transform-origin: 16px 16px; transform: rotate(-60deg); } .button__drow1::after { top: -10px; left: 45px; width: 0; height: 32px; border-radius: 16px; transform-origin: 16px 16px; transform: rotate(69deg); }
        .button__drow2::before { bottom: 0; left: 0; width: 0; height: 32px; border-radius: 16px; transform-origin: 16px 16px; transform: rotate(-146deg); } .button__drow2::after { bottom: 26px; left: -40px; width: 0; height: 32px; border-radius: 16px; transform-origin: 16px 16px; transform: rotate(-262deg); }
        .button__drow1, .button__drow1::before, .button__drow1::after, .button__drow2, .button__drow2::before, .button__drow2::after { background: var(--back_color); }
        .button:hover .button__drow1 { animation: drow1 ease-in 0.06s forwards; } .button:hover .button__drow1::before { animation: drow2 linear 0.08s 0.06s forwards; } .button:hover .button__drow1::after { animation: drow3 linear 0.03s 0.14s forwards; }
        .button:hover .button__drow2 { animation: drow4 linear 0.06s 0.2s forwards; } .button:hover .button__drow2::before { animation: drow3 linear 0.03s 0.26s forwards; } .button:hover .button__drow2::after { animation: drow5 linear 0.06s 0.32s forwards; }
        @keyframes drow1 { 0% { height: 0; } 100% { height: 100px; } } @keyframes drow2 { 0% { width: 0; opacity: 0; } 10% { opacity: 0; } 11% { opacity: 1; } 100% { width: 120px; } }
        @keyframes drow3 { 0% { width: 0; } 100% { width: 80px; } } @keyframes drow4 { 0% { height: 0; } 100% { height: 120px; } } @keyframes drow5 { 0% { width: 0; } 100% { width: 124px; } }

        .container { max-width: 1200px; margin: 50px auto; padding: 0 5%; }
        .title { text-align: center; font-size: 1.8rem; font-weight: 900; margin-bottom: 50px; color: var(--text-main); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 35px; direction: rtl; }
        
        .content-card { border-radius: 40px 10px 40px 10px; padding: 40px 20px 30px; position: relative; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.15); display: flex; flex-direction: column; transition: transform 0.4s, box-shadow 0.4s; border: 1px solid rgba(255,255,255,0.2); }
        .active-card { background: var(--card-active); color: var(--text-main); }
        .active-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        
        .floating-icon { position: absolute; top: -20px; right: -15px; background: var(--header-bg); width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); border: 4px solid var(--bg-body); transition: 0.3s; color: var(--icon-color); }
        html[dir="ltr"] .floating-icon { right: auto; left: -15px; }

        .content-card h3 { font-size: 1.5rem; margin-bottom: 15px; font-weight: 900; }
        .content-card p { margin-bottom: 30px; flex-grow: 1; font-size: 1rem; opacity: 0.9;}
        
        .btn-enter { font-size: 1.1rem; padding: 0.8rem 2.5rem; border: none; outline: none; border-radius: 0.4rem; cursor: pointer; background-color: rgb(14, 14, 26); color: rgb(234, 234, 234); font-weight: 700; transition: 0.6s; box-shadow: 0px 0px 30px rgba(0, 0, 0, 0.4); text-decoration: none; display: inline-block; margin: auto auto 0; font-family: 'Cairo'; width: 100%; }
        .btn-enter:hover { background: linear-gradient(270deg, rgba(2, 29, 78, 0.9) 0%, rgba(31, 215, 232, 0.9) 100%); color: #ffffff; }
        
        .locked-card { background: var(--card-locked); color: var(--text-locked); border: 1px dashed var(--text-locked); opacity: 0.8;}
        .locked-card .floating-icon { color: var(--text-locked); filter: grayscale(100%); }
        
        .spinner-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: auto;}
        .spinner { width: 3em; height: 3em; border-radius: 50%; border: 2px solid transparent; box-shadow: -10px -10px 10px #6359f8, 0px -10px 10px 0px #9c32e2, 10px -10px 10px #f36896, 10px 0 10px #ff0b0b, 10px 10px 10px 0px #ff5500, 0 10px 10px 0px #ff9500, -10px 10px 10px 0px #ffb700; animation: rot55 0.7s linear infinite; position: relative; }
        .spinnerin { border: 2px solid var(--text-locked); width: 1.5em; height: 1.5em; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        @keyframes rot55 { to { transform: rotate(360deg); } }

        /* Responsive Design */
        @media (max-width: 768px) { 
            .navbar { flex-direction: column-reverse; gap: 15px; padding: 15px 5%;} 
            .header-actions { justify-content: center; flex-wrap: wrap; width: 100%; gap: 15px;}
            .page-title { font-size: 1.3rem; text-align: center; justify-content: center; width: 100%;}
            .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
            
            /* تظبيط البوردر والأيقونة للتابلت */
            .content-card { border-radius: 25px 8px 25px 8px; margin-top: 15px; }
            .floating-icon { top: -25px; right: 15px; width: 55px; height: 55px; font-size: 22px;}
            html[dir="ltr"] .floating-icon { left: 15px; right: auto; }
        }

        @media (max-width: 480px) {
            .navbar { padding: 15px; }
            /* تظبيط الهيدر عشان الزراير الكتير متبوظش الشكل */
            .header-actions { flex-wrap: nowrap; gap: 8px; justify-content: space-between; align-items: center; }
            .theme-btn-wrapper { transform: scale(0.55); transform-origin: right; margin-left: -20px;}
            html[dir="ltr"] .theme-btn-wrapper { transform-origin: left; margin-left: 0; margin-right: -20px;}
            .lang-btn-wrapper { transform: scale(0.48); transform-origin: center; margin: 0 -20px;}
            
            /* الزرار ملموم ومضبوط */
            .cta-back { width: auto; font-size: 12px; padding: 6px 12px; transform: skewX(10deg); box-shadow: -3px 3px 0 var(--text-main);}
            [data-theme="dark"] .cta-back { box-shadow: -3px 3px 0 #ffffff; }
            .cta-back .span { transform: skewX(-10deg); }
            .cta-back .second { width: 15px; margin-right: 5px; }
            .cta-back:hover .second { margin-right: 10px; }

            .title { font-size: 1.35rem; margin-bottom: 35px; }
            
            /* جعل التصميم بعمود واحد وتجنب الخروج عن حواف الشاشة */
            .grid { grid-template-columns: 1fr; gap: 35px; }
            
            /* تصغير البوردر بشكل شيك وواقعي جداً للموبايل */
            .content-card { border-radius: 20px 5px 20px 5px; padding: 35px 15px 20px; margin-top: 20px;}
            
            /* تظبيط الأيقونة العائمة عشان متعملش سكرول جانبي وتفضل محتفظة بشكلها */
            .floating-icon { width: 50px; height: 50px; font-size: 18px; top: -25px; right: 15px; border-width: 3px; }
            html[dir="ltr"] .floating-icon { left: 15px; right: auto; }
            
            .content-card h3 { font-size: 1.3rem; margin-bottom: 10px; }
            .btn-enter { font-size: 1rem; padding: 10px 20px; }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <h2 class="page-title" data-i18n="lec_title">محتويات المحاضرة الأولى</h2>
        <div class="header-actions">
            <div class="theme-btn-wrapper">
                <div class="toggleWrapper">
                    <input class="input-theme" id="themeToggleCheck" type="checkbox"/>
                    <label class="toggle" for="themeToggleCheck">
                        <span class="toggle__handler"><span class="crater crater--1"></span><span class="crater crater--2"></span><span class="crater crater--3"></span></span>
                        <span class="star star--1"></span><span class="star star--2"></span><span class="star star--3"></span><span class="star star--4"></span><span class="star star--5"></span><span class="star star--6"></span>
                    </label>
                </div>
            </div>
            <div class="lang-btn-wrapper">
                <a class="button type--C" onclick="toggleLangTrigger()">
                    <div class="button__line"></div><div class="button__line"></div><span class="button__text langText">EN</span>
                    <div class="button__drow1"></div><div class="button__drow2"></div>
                </a>
            </div>
            <button class="cta-back" onclick="window.location.href='../index.html'">
                <span class="second"><svg viewBox="0 0 66 43" version="1.1" xmlns="http://www.w3.org/2000/svg"><g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd"><path class="one" d="M40.15,3.89 L43.97,0.13 L65.69,20.78 L44.67,42.86 L40.15,39.10 L56.99,21.85 Z" fill="#FFFFFF"></path><path class="two" d="M20.15,3.89 L23.97,0.13 L45.69,20.78 L24.67,42.86 L20.15,39.10 L36.99,21.85 Z" fill="#FFFFFF"></path><path class="three" d="M0.15,3.89 L3.97,0.13 L25.69,20.78 L4.67,42.86 L0.15,39.10 L16.99,21.85 Z" fill="#FFFFFF"></path></g></svg></span>
                <span class="span" data-i18n="back_to_subject">عودة للمادة</span>
            </button>
        </div>
    </header>
    <main class="container">
        <h1 class="title" data-i18n="select_content">اختر مسار المذاكرة 📂</h1>
        <div class="grid">

            <div class="content-card locked-card">
                <div class="floating-icon"><i class="fa-solid fa-laptop-code"></i></div>
                <h3 data-i18n="card1_title">الشرح التفاعلي</h3>
                <p data-i18n="card1_desc">ذاكر المحاضرة بنظام الشرائح التفاعلية والأسئلة.</p>
                <div class="spinner-container">
                    <div class="spinner"><div class="spinnerin"></div></div>
                    <span style="font-weight:bold;" data-i18n="loading">جاري التجهيز...</span>
                </div>
            </div>

            <div class="content-card active-card">
                <div class="floating-icon"><i class="fa-solid fa-file-pdf"></i></div>
                <h3 data-i18n="card2_title">الماتيريال الأصلي</h3>
                <p data-i18n="card2_desc">تصفح ملف الـ PDF الخاص بالمحاضرة.</p>
                <a href="pdf-viewer.html" class="btn-enter" data-i18n="btn2">عرض الـ PDF</a>
            </div>
            
        </div>
    </main>
    <script>
        const dict = {
            ar: { 
                lec_title: "محتويات المحاضرة الأولى", back_to_subject: "رجوع للمادة", select_content: "اختر مسار المذاكرة 📂", 
                card1_title: "الشرح التفاعلي", card1_desc: "ذاكر المحاضرة بنظام الشرائح التفاعلية والأسئلة.", loading: "جاري التجهيز...", 
                card2_title: "الماتيريال الأصلي", card2_desc: "تصفح ملف الـ PDF الخاص بالمحاضرة.", btn2: "عرض الـ PDF", 
                card3_title: "المحاضرة المشروحة", card3_desc: "تفريغ وشرح مبسط لشرائح المحاضرة باللغة العربية.", btn3: "قراءة الشرح", 
                langTxt: "EN" 
            },
            en: { 
                lec_title: "First Lecture Contents", back_to_subject: "Back to Subject", select_content: "Choose Study Path 📂", 
                card1_title: "Interactive Study", card1_desc: "Study the lecture with interactive slides and questions.", loading: "Preparing...", 
                card2_title: "Original Material", card2_desc: "Browse the original PDF file of the lecture.", btn2: "View PDF", 
                card3_title: "Explained Lecture", card3_desc: "Simplified transcript and explanation of the slides.", btn3: "Read Explanation", 
                langTxt: "عربي" 
            }
        };
        
        let lang = localStorage.getItem('globalLang') || 'ar';
        let theme = localStorage.getItem('globalTheme') || 'light';
        const themeToggle = document.getElementById('themeToggleCheck');
        
        function initPlatform() { 
            if(theme === 'dark') { 
                themeToggle.checked = true; 
                document.documentElement.setAttribute('data-theme', 'dark'); 
            } else { 
                themeToggle.checked = false; 
                document.documentElement.setAttribute('data-theme', 'light'); 
            }
            applyLang(lang); 
        }
        
        themeToggle.addEventListener('change', (e) => { 
            theme = e.target.checked ? 'dark' : 'light'; 
            document.documentElement.setAttribute('data-theme', theme); 
            localStorage.setItem('globalTheme', theme); 
        });
        
        function toggleLangTrigger() { 
            lang = lang === 'ar' ? 'en' : 'ar'; 
            localStorage.setItem('globalLang', lang); 
            applyLang(lang); 
        }
        
        function applyLang(l) { 
            document.documentElement.lang = l; 
            document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr'; 
            document.querySelectorAll('.langText').forEach(el => el.innerText = dict[l].langTxt); 
            document.querySelectorAll('[data-i18n]').forEach(el => { 
                if(dict[l][el.getAttribute('data-i18n')]) el.innerText = dict[l][el.getAttribute('data-i18n')]; 
            }); 
        }
        
        document.addEventListener('contextmenu', e => e.preventDefault()); 
        document.ondragstart = () => false; 
        document.addEventListener('keydown', e => { 
            if (e.key === 'F12' || e.keyCode === 123) return false; 
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'C')) return false; 
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 'P')) return false; 
        });
        
        window.onload = initPlatform;
    </script>
</body>
</html>
