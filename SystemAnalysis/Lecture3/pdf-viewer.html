<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عرض الـ PDF | المحاضرة الثالثة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ألوان مادة تحليل وتصميم النظم الموحدة */
            --bg-gradient-light: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --text-main-light: #2d3748;
            --primary-light: #1a365d; 
            --accent-light: #00b4d8;  
            --header-bg-light: rgba(255, 255, 255, 0.98);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        [data-theme="dark"] {
            --bg-gradient-dark: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --text-main-dark: #f1f5f9;
            --primary-dark: #4cc9f0;
            --accent-dark: #fca311;
            --header-bg-dark: rgba(15, 23, 42, 0.98);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* تطبيق المتغيرات بناءً على الثيم */
        body {
            --bg-body: var(--bg-gradient-light);
            --text: var(--text-main-light);
            --primary: var(--primary-light);
            --accent: var(--accent-light);
            --header-bg: var(--header-bg-light);
        }

        [data-theme="dark"] body {
            --bg-body: var(--bg-gradient-dark);
            --text: var(--text-main-dark);
            --primary: var(--primary-dark);
            --accent: var(--accent-dark);
            --header-bg: var(--header-bg-dark);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        
        /* إعدادات Flexbox لضمان التجاوب 100% ومنع الـ Scroll الخارجي */
        html, body { 
            height: 100%; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            background: var(--bg-body);
            color: var(--text);
        }

        /* ================= الهيدر الموحد ================= */
        header { 
            height: 80px; 
            background: var(--header-bg); 
            backdrop-filter: blur(12px); 
            border-bottom: 2px solid var(--primary); 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            z-index: 1000; 
            box-shadow: var(--shadow); 
            position: relative; 
            flex-shrink: 0; 
        }
        
        .header-title-container { 
            text-align: center; 
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%); 
            white-space: nowrap; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        .header-title { font-weight: 900; font-size: 1.1rem; color: var(--primary); }
        .header-subtitle { font-size: 0.8rem; color: var(--accent); font-weight: bold; }

        /* ================= زر الرجوع الاحترافي ================= */
        .cta-back { display: flex; align-items: center; padding: 6px 15px; text-decoration: none; font-size: 16px; font-weight: bold; color: white; background: var(--primary); transition: 1s; box-shadow: -4px 4px 0 var(--text); transform: skewX(15deg); border: none; cursor: pointer; z-index: 2;}
        [data-theme="dark"] .cta-back { box-shadow: -4px 4px 0 #ffffff; color: #000; background: var(--primary);}
        .cta-back:focus { outline: none; }
        .cta-back:hover { transition: 0.5s; box-shadow: -6px 6px 0 var(--accent); }
        .cta-back .span { transform: skewX(-15deg); font-family: 'Cairo'; }
        .cta-back .second { transition: 0.5s; margin-left: 0; margin-right: 10px; width: 20px; transform: rotate(180deg); display: flex; align-items: center;}
        .cta-back:hover .second { transition: 0.5s; margin-right: 20px; }
        .cta-back .one { transition: 0.4s; transform: translateX(-60%); }
        .cta-back .two { transition: 0.5s; transform: translateX(-30%); }
        .cta-back:hover .three { animation: color_anim 1s infinite 0.2s; }
        .cta-back:hover .one { transform: translateX(0%); animation: color_anim 1s infinite 0.6s; }
        .cta-back:hover .two { transform: translateX(0%); animation: color_anim 1s infinite 0.4s; }
        @keyframes color_anim { 0% { fill: white; } 50% { fill: var(--accent); } 100% { fill: white; } }

        /* ================= حاوية الـ PDF ================= */
        .container { 
            width: 100%; 
            flex: 1; 
            background: #2a2a2a; /* لون داكن مريح للعين خلف ملف الـ PDF */
            position: relative;
        }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
        }

        /* --------------------------------------------------- */
        /* --- الميديا كويري لتوافق الموبايل --- */
        /* --------------------------------------------------- */
        @media (max-width: 768px) {
            header { padding: 0 10px; height: 70px; }
            .header-subtitle { display: none; }
            .header-title-container { position: static; transform: none; flex: 1; text-align: left; padding-left: 10px; }
            [dir="rtl"] .header-title-container { text-align: right; padding-right: 10px; padding-left: 0; }
            .header-title { font-size: 1rem; }
            
            .cta-back { padding: 5px 10px; font-size: 14px; }
            .cta-back .span { display: none; } /* إخفاء النص وترك السهم لتوفير المساحة */
            .cta-back .second { margin-right: 0; width: 18px; }
        }
    </style>
</head>
<body>
    
    <header>
        <button class="cta-back" onclick="window.location.href='index.html'">
            <span class="second"><svg viewBox="0 0 66 43" version="1.1" xmlns="http://www.w3.org/2000/svg"><g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd"><path class="one" d="M40.15,3.89 L43.97,0.13 L65.69,20.78 L44.67,42.86 L40.15,39.10 L56.99,21.85 Z" fill="#FFFFFF"></path><path class="two" d="M20.15,3.89 L23.97,0.13 L45.69,20.78 L24.67,42.86 L20.15,39.10 L36.99,21.85 Z" fill="#FFFFFF"></path><path class="three" d="M0.15,3.89 L3.97,0.13 L25.69,20.78 L4.67,42.86 L0.15,39.10 L16.99,21.85 Z" fill="#FFFFFF"></path></g></svg></span>
            <span class="span">الرجوع</span>
        </button>

        <div class="header-title-container">
            <div class="header-title" id="pageTitle">ماتيريال المحاضرة الثالثة 📄</div>
            <div class="header-subtitle" id="pageSubTitle">Lec 3: Unified Modeling Language</div>
        </div>
    </header>

    <div class="container">
        <iframe src="Lec3__System Analysis and Design(1).pdf"></iframe>
    </div>

    <script>
        // قراءة الـ Theme والـ Language من التخزين المحلي لضمان التناسق
        function initSettings() {
            const savedTheme = localStorage.getItem('globalTheme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            const savedLang = localStorage.getItem('globalLang') || 'ar';
            document.documentElement.lang = savedLang;
            document.documentElement.dir = savedLang === 'ar' ? 'rtl' : 'ltr';

            if (savedLang === 'en') {
                document.title = "PDF Viewer | Third Lecture";
                document.getElementById('pageTitle').innerText = "Third Lecture Material 📄";
                document.querySelector('.cta-back .span').innerText = "Back";
            }
        }
        
        // منع الفحص والاختصارات كنوع من الحماية البسيطة 
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) return false;
        });

        window.onload = initSettings;
    </script>
</body>
</html>
