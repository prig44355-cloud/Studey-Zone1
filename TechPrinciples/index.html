<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مبادئ التكنولوجيا | المنصة التعليمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ==================== هوية مادة مبادئ التكنولوجيا (الأزرق والسماوي) ==================== */
        :root {
            --bg-body: #fdfbfb; 
            --text-main: #2d3748; 
            --header-bg: rgba(255, 255, 255, 0.98);
            --primary: #2b6cb0; 
            --accent: #38b2ac;  
            
            /* ألوان الكروت */
            --card-active: linear-gradient(135deg, #2b6cb0 0%, #1a365d 100%); 
            --card-locked: linear-gradient(135deg, #e2ebf0 0%, #cfd9df 100%);
            --text-locked: #475569; 
            --icon-color: #38b2ac; 
        }
        [data-theme="dark"] {
            --bg-body: #0f172a; 
            --text-main: #f1f5f9; 
            --header-bg: rgba(15, 23, 42, 0.98);
            --primary: #63b3ed;
            --accent: #4fd1c5;
            
            --card-active: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --card-locked: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --text-locked: #94a3b8; 
            --icon-color: #4fd1c5; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
        body { background: var(--bg-body); color: var(--text-main); min-height: 100vh; overflow-x: hidden; -webkit-user-select: none; user-select: none; }

        /* ==================== الهيدر الزجاجي الموحد ==================== */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--header-bg); padding: 15px 5%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); border-bottom: 2px solid var(--primary);
        }
        .page-title { font-size: 1.5rem; font-weight: 900; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        /* ==================== زر الرجوع الاحترافي ==================== */
        .cta-back { 
            display: flex; align-items: center; justify-content: center; padding: 8px 25px; text-decoration: none; font-size: 18px; 
            font-weight: bold; color: white; background: var(--primary); transition: 1s; 
            box-shadow: -5px 5px 0 var(--text-main); transform: skewX(15deg); border: none; cursor: pointer; 
        }
        [data-theme="dark"] .cta-back { background: var(--primary); color: #000; box-shadow: -5px 5px 0 #ffffff; }
        .cta-back:focus { outline: none; }
        .cta-back:hover { transition: 0.5s; box-shadow: -8px 8px 0 var(--accent); }
        .cta-back .span { transform: skewX(-15deg); font-family: 'Cairo'; }
        .cta-back .second { transition: 0.5s; margin-left: 0; margin-right: 15px; width: 25px; transform: rotate(180deg); display: flex; align-items: center;}
        .cta-back:hover .second { transition: 0.5s; margin-right: 35px; }
        .one { transition: 0.4s; transform: translateX(-60%); }
        .two { transition: 0.5s; transform: translateX(-30%); }
        .cta-back:hover .three { animation: color_anim 1s infinite 0.2s; }
        .cta-back:hover .one { transform: translateX(0%); animation: color_anim 1s infinite 0.6s; }
        .cta-back:hover .two { transform: translateX(0%); animation: color_anim 1s infinite 0.4s; }
        @keyframes color_anim { 0% { fill: white; } 50% { fill: var(--accent); } 100% { fill: white; } }

        /* ==================== شبكة المحاضرات ==================== */
        .container { max-width: 1200px; margin: 50px auto; padding: 0 5%; }
        .title { text-align: center; font-size: 1.8rem; font-weight: 900; margin-bottom: 50px; color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 35px; direction: rtl; }

        .lec-card {
            border-radius: 40px 10px 40px 10px; padding: 40px 20px 30px; 
            position: relative; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            display: flex; flex-direction: column; transition: transform 0.4s, box-shadow 0.4s; 
            border: 1px solid rgba(255,255,255,0.2);
        }

        .active-card { background: var(--card-active); color: white; border: 1px solid rgba(56, 178, 172, 0.3); }
        .active-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(56, 178, 172, 0.2); }
        
        .floating-icon {
            position: absolute; top: -20px; right: -15px;
            background: var(--header-bg); width: 65px; height: 65px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); border: 4px solid var(--bg-body); transition: 0.3s;
            color: var(--icon-color);
        }

        .lec-card h3 { font-size: 1.5rem; margin-bottom: 15px; font-weight: 900; color: var(--icon-color); }
        .lec-card p { margin-bottom: 30px; flex-grow: 1; font-size: 1rem; opacity: 0.9; color: #f8fafc;}
        
        /* زر الدخول */
        .btn-glass {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px);
            border: 1px solid rgba(56, 178, 172, 0.5); color: white;
            padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: bold;
            font-size: 1.1rem; display: block; transition: 0.6s; margin: auto auto 0; width: 100%;
        }
        .btn-glass:hover { background: var(--accent); color: white; box-shadow: 0 5px 15px rgba(56, 178, 172, 0.4); }

        /* الكروت المقفولة */
        .locked-card { background: var(--card-locked); color: var(--text-locked); border: 1px dashed var(--text-locked); opacity: 0.8;}
        .locked-card h3 { color: var(--text-locked); }
        .locked-card .floating-icon { color: var(--text-locked); filter: grayscale(100%); }
        
        /* الأنيميشن اللوني للتحميل */
        .spinner-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: auto;}
        .spinner { 
            width: 3em; height: 3em; border-radius: 50%; border: 2px solid transparent; 
            box-shadow: -10px -10px 10px rgba(43, 108, 176, 0.5), 0px -10px 10px 0px rgba(56, 178, 172, 0.5), 10px -10px 10px rgba(43, 108, 176, 0.5), 10px 0 10px rgba(56, 178, 172, 0.5), 10px 10px 10px 0px rgba(43, 108, 176, 0.5), 0 10px 10px 0px rgba(56, 178, 172, 0.5), -10px 10px 10px 0px rgba(43, 108, 176, 0.5); 
            animation: rot55 0.7s linear infinite; position: relative;
        }
        [data-theme="dark"] .spinner { box-shadow: -10px -10px 10px rgba(99, 179, 237, 0.5), 0px -10px 10px 0px rgba(79, 209, 197, 0.5), 10px -10px 10px rgba(99, 179, 237, 0.5), 10px 0 10px rgba(79, 209, 197, 0.5), 10px 10px 10px 0px rgba(99, 179, 237, 0.5), 0 10px 10px 0px rgba(79, 209, 197, 0.5), -10px 10px 10px 0px rgba(99, 179, 237, 0.5); }
        .spinnerin { border: 2px solid var(--text-locked); width: 1.5em; height: 1.5em; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        @keyframes rot55 { to { transform: rotate(360deg); } }

        @media (max-width: 768px) { 
            .navbar { flex-direction: column-reverse; gap: 15px; padding: 15px;} 
            .floating-icon { top: -20px; right: -10px; width: 55px; height: 55px; font-size: 18px;}
            .cta-back { width: 100%; max-width: 250px; }
        }
    </style>
</head>
<body>
    
    <header class="navbar">
        <h2 class="page-title">💻 مبادئ التكنولوجيا</h2>
        <button class="cta-back" onclick="window.location.href='../index.html'">
            <span class="second"><svg viewBox="0 0 66 43" version="1.1" xmlns="http://www.w3.org/2000/svg"><g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd"><path class="one" d="M40.15,3.89 L43.97,0.13 L65.69,20.78 L44.67,42.86 L40.15,39.10 L56.99,21.85 Z" fill="#FFFFFF"></path><path class="two" d="M20.15,3.89 L23.97,0.13 L45.69,20.78 L24.67,42.86 L20.15,39.10 L36.99,21.85 Z" fill="#FFFFFF"></path><path class="three" d="M0.15,3.89 L3.97,0.13 L25.69,20.78 L4.67,42.86 L0.15,39.10 L16.99,21.85 Z" fill="#FFFFFF"></path></g></svg></span>
            <span class="span">الرئيسية</span>
        </button>
    </header>

    <main class="container">
        <h1 class="title">قائمة المحاضرات 📚</h1>
        <div class="grid">
            
            <div class="lec-card active-card">
                <div class="floating-icon">1</div>
                <h3 class="lec-title">المحاضرة الأولى</h3>
                <p class="lec-desc">مقدمة في مفاهيم التكنولوجيا.</p>
                <a href="Lecture1/index.html" class="btn-glass">دخول للمحاضرة</a>
            </div>

            <div class="lec-card locked-card">
                <div class="floating-icon">2</div>
                <h3 class="lec-title">المحاضرة الثانية</h3>
                <div class="spinner-container">
                    <div class="spinner"><div class="spinnerin"></div></div>
                    <span style="font-weight:bold;" class="loading-text">جاري التجهيز...</span>
                </div>
            </div>

            <div class="lec-card locked-card">
                <div class="floating-icon">3</div>
                <h3 class="lec-title">المحاضرة الثالثة</h3>
                <div class="spinner-container">
                    <div class="spinner"><div class="spinnerin"></div></div>
                    <span style="font-weight:bold;" class="loading-text">جاري التجهيز...</span>
                </div>
            </div>

        </div>
    </main>

    <script>
        let globalTheme = localStorage.getItem('globalTheme') || 'light';
        let globalLang = localStorage.getItem('globalLang') || 'ar';

        function initSubPage() {
            document.documentElement.setAttribute('data-theme', globalTheme);
            document.documentElement.lang = globalLang;
            document.documentElement.dir = globalLang === 'ar' ? 'rtl' : 'ltr';
            
            if (globalLang === 'en') {
                document.querySelector('.page-title').innerText = '💻 Tech Principles';
                document.querySelector('.span').innerText = 'Home';
                document.querySelector('.title').innerText = 'Lectures List 📚';
                
                const titles = document.querySelectorAll('.lec-title');
                if(titles[0]) titles[0].innerText = 'Lecture 1';
                if(titles[1]) titles[1].innerText = 'Lecture 2';
                if(titles[2]) titles[2].innerText = 'Lecture 3';

                const descs = document.querySelectorAll('.lec-desc');
                if(descs[0]) descs[0].innerText = 'Introduction to Technology concepts.';

                const btns = document.querySelectorAll('.btn-glass');
                btns.forEach(btn => btn.innerText = 'Enter Lecture');

                const loaders = document.querySelectorAll('.loading-text');
                loaders.forEach(loader => loader.innerText = 'Preparing...');
            }
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.ondragstart = () => false;
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || e.keyCode === 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'C')) return false;
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 'P')) return false;
        });

        window.onload = initSubPage;
    </script>
</body>
</html>
