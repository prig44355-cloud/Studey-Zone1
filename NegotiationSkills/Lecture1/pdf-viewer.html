<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض الـ PDF | المحاضرة الأولى</title>
    <style>
        /* التعديلات شملت استخدام Flexbox لضمان تجاوب الشاشة بشكل مثالي */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
        }
        
        .header { 
            background: #fff; 
            padding: 15px 30px; 
            display: flex; 
            align-items: center; 
            border-bottom: 2px solid #f59e0b; 
            flex-shrink: 0; /* لمنع الهيدر من الانضغاط */
        }
        
        .header h3 {
            margin: 0; /* إزالة الهوامش الافتراضية لضبط الارتفاع */
        }
        
        .back-btn { 
            background: #f59e0b; 
            color: white; 
            text-decoration: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: bold; 
            margin-left: 20px;
            white-space: nowrap; /* لمنع انكسار الكلمة في الشاشات الصغيرة */
        }
        
        .container { 
            width: 100%; 
            flex: 1; /* يأخذ باقي مساحة الشاشة تلقائياً بدلاً من calc */
            background: #333; 
        }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }

        /* --- الميديا كويري لتوافق الموبايل والشاشات الصغيرة --- */
        @media (max-width: 600px) {
            .header {
                padding: 10px 15px;
            }
            .back-btn {
                padding: 8px 15px;
                margin-left: 12px;
                font-size: 14px;
            }
            .header h3 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">رجوع</a>
        <h3>ماتيريال المحاضرة الأولى</h3>
    </div>
    <div class="container">
        <iframe src="المحاضرة الاولي لمهارات التفاوض الجامعة الدولية  1.pdf"></iframe>
    </div>
</body>
</html>
