    <style>

        .cta-back:hover .one { transform: translateX(0%); animation: color_anim 1s infinite 0.6s; }

        .card { background: var(--glass); width: 100%; max-width: 900px; padding: 30px; border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 30px; animation: slideUp 0.5s ease-out; overflow-x: hidden; }

        .practice-item { background: rgba(0,0,0,0.03); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }

        .btn-check { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; white-space: nowrap; }
        .feedback { font-weight: bold; font-size: 1rem; display: none; padding: 5px 10px; border-radius: 5px; width: 100%; }
        .feedback.correct { display: inline-block; background: rgba(56, 161, 105, 0.2); color: var(--success); }
        .feedback.wrong { display: inline-block; background: rgba(229, 62, 62, 0.2); color: var(--error); }

        .quiz-item.revealed .quiz-a { display: block; animation: fadeIn 0.3s; }

        .bb8-toggle { --toggle-size: 5px; --toggle-width: 10.625em; --toggle-height: 5.625em; --toggle-offset: calc((var(--toggle-height) - var(--bb8-diameter)) / 2); --toggle-bg: linear-gradient(#2c4770, #070e2b 35%, #628cac 50% 70%, #a6c5d4) no-repeat; --bb8-diameter: 4.375em; --radius: 99em; --transition: 0.4s; --accent: #de7d2f; --bb8-bg: #fff; cursor: pointer; font-size: var(--toggle-size); display: inline-block; flex-shrink: 0; }

        .bb8__head::after { content: ""; position: absolute; bottom: 0.375em; left: 0; width: 100%; height: 0.188em; background: linear-gradient(to right, var(--accent) 0.125em, transparent 0.125em 0.188em, var(--accent) 0.188em 0.313em, transparent 0.313em 0.375em, var(--accent) 0.375em 0.938em, transparent 0.938em 1em, var(--accent) 1em 1.125em, transparent 1.125em 1.875em, var(--accent) 1.875em 2em, transparent 2em 2.063em, var(--accent) 2.063em 2.25em, transparent 2.25em 2.313em, var(--accent) 2.313em 2.375em, transparent 2.375em 2.438em, var(--accent) 2.438em); transition: var(--transition); }
        .bb8__antenna { position: absolute; transform: translateY(-90%); width: 0.059em; border-radius: var(--radius) var(--radius) 0 0; transition: var(--transition); }
        .bb8__antenna:nth-child(1) { height: 0.938em; right: 0.938em; background: linear-gradient(#000 0.188em, silver 0.188em); }

        .bb8__body { width: 4.375em; height: 4.375em; background: var(--bb8-bg); border-radius: var(--radius); position: relative; overflow: hidden; transition: var(--transition); z-index: 1; transform: rotate(45deg); background: linear-gradient(-90deg, var(--bb8-bg) 4%, var(--accent) 4% 10%, transparent 10% 90%, var(--accent) 90% 96%, var(--bb8-bg) 96%), linear-gradient(var(--bb8-bg) 4%, var(--accent) 4% 10%, transparent 10% 90%, var(--accent) 90% 96%, var(--bb8-bg) 96%), linear-gradient(to right, transparent 2.156em, silver 2.156em 2.219em, transparent 2.188em), linear-gradient(transparent 2.156em, silver 2.156em 2.219em, transparent 2.188em); background-color: var(--bb8-bg); }
        .bb8__body::after { content: ""; bottom: 1.5em; left: 0.563em; position: absolute; width: 0.188em; height: 0.188em; background: rgb(236, 236, 236); border-radius: 50%; box-shadow: 0.875em 0.938em, 0 -1.25em, 0.875em -2.125em, 2.125em -2.125em, 3.063em -1.25em, 3.063em 0, 2.125em 0.938em; }
        .bb8__body::before { content: ""; width: 2.625em; height: 2.625em; position: absolute; border-radius: 50%; z-index: 0.1; overflow: hidden; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 0.313em solid var(--accent); background: radial-gradient(1em circle at center, rgb(236, 236, 236) 50%, transparent 51%), radial-gradient(1.25em circle at center, var(--bb8-bg) 50%, transparent 51%), linear-gradient(-90deg, transparent 42%, var(--accent) 42% 58%, transparent 58%), linear-gradient(var(--bb8-bg) 42%, var(--accent) 42% 58%, var(--bb8-bg) 58%); }
        .artificial__hidden { position: absolute; border-radius: inherit; inset: 0; pointer-events: none; overflow: hidden; }
        .bb8__shadow { content: ""; width: var(--bb8-diameter); height: 20%; border-radius: 50%; background: #3a271c; box-shadow: 0.313em 0 3.125em #3a271c; opacity: 0.25; position: absolute; bottom: 0; left: calc(var(--toggle-offset) - 0.938em); transition: var(--transition); transform: skew(-70deg); z-index: 1; }
        .bb8-toggle__scenery { width: 100%; height: 100%; pointer-events: none; overflow: hidden; position: relative; border-radius: inherit; }
        .bb8-toggle__scenery::before { content: ""; position: absolute; width: 100%; height: 30%; bottom: 0; background: #b18d71; z-index: 1; }
        .bb8-toggle__cloud { z-index: 1; position: absolute; border-radius: 50%; }
        .bb8-toggle__cloud:nth-last-child(1) { width: 0.875em; height: 0.625em; filter: blur(0.125em) drop-shadow(0.313em 0.313em #ffffffae) drop-shadow(-0.625em 0 #fff) drop-shadow(-0.938em -0.125em #fff); right: 1.875em; top: 2.813em; background: linear-gradient(to top right, #ffffffae, #ffffffae); transition: var(--transition); }

        .nav-actions { display: flex; gap: 30px; margin-top: 30px; justify-content: center; flex-wrap: wrap; width: 100%; }

<script>
    const slides = [
        {
            title: "1. يعني إيه OOP؟",
            title_en: "1. What is OOP?",
            badge: "مقدمة",
            badge_en: "Introduction",
            content: `
                <p><strong>OOP = Object Oriented Programming</strong></p>
                <p>يعني البرمجة المعتمدة على الكائنات (الأشياء). الفكرة ببساطة: بدل ما البرنامج يبقى كود عشوائي ومتداخل، بنقسمه لأشياء (Objects) تحاكي الواقع.</p>
                <div class="method-box">
                    <strong>مثال من الحياة:</strong><br>
                    عندك <strong>طالب</strong>. <br>
                    الطالب عنده خصائص (بيانات): <ul><li>اسم</li><li>عمر</li><li>كلية</li></ul>
                    وكمان بيعمل أفعال (وظائف): <ul><li>يدرس</li><li>يذاكر</li></ul>
                </div>
                <p>في لغة Python: <strong>كل شيء تقريباً هو Object</strong>. حتى الـ String والـ List!</p>
            `,
            content_en: `
                <p><strong>OOP = Object-Oriented Programming</strong></p>
                <p>It means programs are built using objects that contain data and behavior. Instead of random code, we structure it like real-world entities.</p>
                <div class="method-box">
                    <strong>Real-life Example:</strong><br>
                    Consider a <strong>Student</strong>. <br>
                    A student has attributes (data): <ul><li>Name</li><li>Age</li><li>College</li></ul>
                    A student also has behaviors (methods): <ul><li>Studies</li><li>Reads</li></ul>
                </div>
                <p>In Python: <strong>Almost everything is an Object!</strong> Even strings and lists.</p>
            `
        },
        {
            title: "2. أهم 4 مفاهيم في OOP",
            title_en: "2. The 4 Main Concepts of OOP",
            badge: "مفاهيم أساسية",
            badge_en: "Core Concepts",
            content: `
                <p>عشان تفهم برمجة الكائنات، لازم تحفظ الأربع كلمات دول زي اسمك:</p>
                <div style="overflow-x: auto;">
                    <table>
                        <tr><th>المصطلح البرمجي</th><th>المعنى الحرفي</th><th>الشرح المبسط</th></tr>
                        <tr><td><strong>Class</strong></td><td>القالب / المخطط</td><td>زي مخطط العربية قبل ما تتصنع. هو التصميم الأساسي.</td></tr>
                        <tr><td><strong>Object</strong></td><td>الكائن / النسخة</td><td>نسخة حقيقية تم تصنيعها من هذا القالب.</td></tr>
                        <tr><td><strong>Attribute</strong></td><td>الخصائص / البيانات</td><td>البيانات اللي جوه الأوبجكت (زي اللون، الاسم، العمر).</td></tr>
                        <tr><td><strong>Method</strong></td><td>الوظيفة / الفعل</td><td>دالة (Function) موجودة جوه الكلاس بتعمل أكشن معين.</td></tr>
                    </table>
                </div>
            `,
            content_en: `
                <p>To master OOP, you need to understand these four core terms:</p>
                <div style="overflow-x: auto;">
                    <table>
                        <tr><th>Concept</th><th>Meaning</th><th>Simple Explanation</th></tr>
                        <tr><td><strong>Class</strong></td><td>Template / Blueprint</td><td>Like a car's blueprint before it's built. The core design.</td></tr>
                        <tr><td><strong>Object</strong></td><td>Instance</td><td>A real, usable copy created from the blueprint.</td></tr>
                        <tr><td><strong>Attribute</strong></td><td>Data / Properties</td><td>The variables stored inside the object (Color, Name, Age).</td></tr>
                        <tr><td><strong>Method</strong></td><td>Function / Behavior</td><td>A function defined inside a class that performs an action.</td></tr>
                    </table>
                </div>
            `
        },
        {
            title: "3. كيفية تعريف Class و Object",
            title_en: "3. Defining a Class and an Object",
            badge: "التطبيق العملي",
            badge_en: "Practical Application",
            content: `
                <p><strong>يعني إيه Class؟</strong> هو القالب اللي بنصنع منه.</p>
                <div class="example-box">
<span class="keyword">class</span> Student:
    <span class="keyword">pass</span> <span class="comment"># كلاس فارغ مؤقتاً</span>
                </div>
                
                <p><strong>يعني إيه Object؟</strong> هو النسخة الحقيقية (Instance) من الكلاس. في بايثون <strong>لا يوجد كلمة new</strong> لإنشاء أوبجكت كما في لغة جافا، نكتب اسم الكلاس وأقواس مباشرة.</p>
                <div class="example-box">
<span class="comment"># إنشاء أوبجكت (نسخة) من كلاس الطالب</span>
s1 = Student()
                </div>
            `,
            content_en: `
                <p><strong>What is a Class?</strong> It's the blueprint we create from.</p>
                <div class="example-box">
<span class="keyword">class</span> Student:
    <span class="keyword">pass</span> <span class="comment"># An empty class for now</span>
                </div>
                
                <p><strong>What is an Object?</strong> It is the real instance of the class. Note: In Python, <strong>there is no 'new' keyword</strong> like in Java. You just call the class name.</p>
                <div class="example-box">
<span class="comment"># Creating an instance (object) of Student</span>
s1 = Student()
                </div>
            `
        },
        {
            title: "4. الدالة البناءة (Constructor: __init__)",
            title_en: "4. The Constructor (__init__)",
            badge: "دوال أساسية",
            badge_en: "Core Methods",
            content: `
                <p>الميثود الخاصة <code>__init__</code> هي <strong>الدالة البناءة (Constructor)</strong>. يتم تشغيلها <strong>تلقائياً</strong> أول ما ننشئ Object جديد عشان تعطي له بياناته الأولية (Attributes).</p>
                <div class="example-box">
<span class="keyword">class</span> Student:
    <span class="keyword">def</span> <span class="function">__init__</span>(self, name, age):
        self.name = name
        self.age = age

<span class="comment"># إنشاء أوبجكت وتمرير البيانات فوراً</span>
s1 = Student(<span class="string">"Ali"</span>, <span class="keyword">20</span>)
                </div>
                <div class="method-box">
                    القيم <strong>"Ali"</strong> و <strong>20</strong> بيتم إرسالهم تلقائياً لـ <code>__init__</code> لتخزينهم جوا الأوبجكت <code>s1</code>.
                </div>
            `,
            content_en: `
                <p>The special method <code>__init__</code> is the <strong>Constructor</strong>. It runs <strong>automatically</strong> when a new Object is created to initialize its Attributes.</p>
                <div class="example-box">
<span class="keyword">class</span> Student:
    <span class="keyword">def</span> <span class="function">__init__</span>(self, name, age):
        self.name = name
        self.age = age

<span class="comment"># Creating an object and passing data</span>
s1 = Student(<span class="string">"Ali"</span>, <span class="keyword">20</span>)
                </div>
                <div class="method-box">
                    The values <strong>"Ali"</strong> and <strong>20</strong> are automatically passed to <code>__init__</code> to be stored inside the <code>s1</code> object.
                </div>
            `
        },
        {
            title: "5. الوصول للبيانات وإضافة Methods",
            title_en: "5. Accessing Data & Adding Methods",
            badge: "التطبيق العملي",
            badge_en: "Practical Application",
            content: `
                <p>للوصول للبيانات (Attributes) واستدعاء الوظائف (Methods)، بنستخدم <strong>النقطة (.)</strong>.</p>
                <div class="example-box">
<span class="keyword">class</span> Student:
    <span class="keyword">def</span> <span class="function">__init__</span>(self, name):
        self.name = name

    <span class="comment"># إضافة Method (وظيفة)</span>
    <span class="keyword">def</span> <span class="function">greet</span>(self):
        <span class="keyword">print</span>(<span class="string">"Hello"</span>, self.name)

<span class="comment"># التشغيل</span>
s1 = Student(<span class="string">"Mahmoud"</span>)
<span class="keyword">print</span>(s1.name)  <span class="comment"># الوصول للبيانات (Output: Mahmoud)</span>
s1.greet()      <span class="comment"># تشغيل الميثود (Output: Hello Mahmoud)</span>
                </div>
            `,
            content_en: `
                <p>To access data (Attributes) and call functions (Methods), we use the <strong>dot (.) operator</strong>.</p>
                <div class="example-box">
<span class="keyword">class</span> Student:
    <span class="keyword">def</span> <span class="function">__init__</span>(self, name):
        self.name = name

    <span class="comment"># Adding a Method (Behavior)</span>
    <span class="keyword">def</span> <span class="function">greet</span>(self):
        <span class="keyword">print</span>(<span class="string">"Hello"</span>, self.name)

<span class="comment"># Execution</span>
s1 = Student(<span class="string">"Mahmoud"</span>)
<span class="keyword">print</span>(s1.name)  <span class="comment"># Accessing data (Output: Mahmoud)</span>
s1.greet()      <span class="comment"># Calling method (Output: Hello Mahmoud)</span>
                </div>
            `
        },
        {
            title: "6. ما هي كلمة self ؟",
            title_en: "6. What is 'self'?",
            badge: "مفاهيم أساسية",
            badge_en: "Core Concepts",
            content: `
                <p>كلمة <code>self</code> هي <strong>مرجع للكائن الحالي (Current Object)</strong>.</p>
                <ul>
                    <li>لما بنكتب <code>self.age</code>، إحنا بنقول لبايثون "هات العمر بتاع <strong>هذا</strong> الأوبجكت تحديداً".</li>
                    <li><strong>ملاحظة هامة:</strong> بايثون بيمرر كلمة <code>self</code> بشكل <strong>تلقائي وخفي</strong> لما بتستدعي أي ميثود.</li>
                </ul>
                <div class="example-box">
<span class="comment"># تعريف الميثود في الكلاس (تأخذ parameter اسمه num بجانب self)</span>
<span class="keyword">def</span> <span class="function">set_age</span>(self, num):
    self.age = num

<span class="comment"># عند الاستدعاء نعطيها رقم 23 فقط، وبايثون يرسل الكائن (x) مكان self خفية</span>
x.set_age(<span class="keyword">23</span>)
                </div>
            `,
            content_en: `
                <p>The word <code>self</code> is a <strong>reference to the current object</strong>.</p>
                <ul>
                    <li>When we write <code>self.age</code>, we are telling Python "get the age of <strong>THIS specific</strong> object".</li>
                    <li><strong>Important:</strong> Python passes <code>self</code> <strong>automatically and implicitly</strong> when you call any method.</li>
                </ul>
                <div class="example-box">
<span class="comment"># Method definition in the class (takes 'num' besides 'self')</span>
<span class="keyword">def</span> <span class="function">set_age</span>(self, num):
    self.age = num

<span class="comment"># When calling, we pass 23, and Python invisibly passes object 'x' into 'self'</span>
x.set_age(<span class="keyword">23</span>)
                </div>
            `
        },
        {
            title: "7. أنواع الـ Attributes",
            title_en: "7. Types of Attributes",
            badge: "البيانات",
            badge_en: "Data",
            content: `
                <p>البيانات (Attributes) نوعين في بايثون:</p>
                <div class="method-box">
                    <strong>1. Data Attributes (Instance Attributes):</strong><br>
                    بيانات <strong>خاصة بكل أوبجكت لوحده</strong>. مثل <code>self.name</code>. كل طالب له اسم مختلف عن التاني.
                </div>
                <div class="method-box">
                    <strong>2. Class Attributes:</strong><br>
                    متغيرات <strong>مشتركة بين كل الأوبجكتس</strong>، بيتم تعريفها جوه الكلاس مباشرة (بره الـ <code>__init__</code>).
                </div>
                <div class="example-box">
<span class="keyword">class</span> Counter:
    overall_total = <span class="keyword">0</span>  <span class="comment"># Class Attribute (مشترك للكل)</span>

    <span class="keyword">def</span> <span class="function">__init__</span>(self):
        self.my_total = <span class="keyword">0</span>  <span class="comment"># Data Attribute (خاص بالنسخة دي بس)</span>
                </div>
            `,
            content_en: `
                <p>Attributes in Python are of two types:</p>
                <div class="method-box">
                    <strong>1. Data Attributes (Instance Attributes):</strong><br>
                    Variables <strong>unique to each object</strong> (e.g., <code>self.name</code>). Every student has a different name.
                </div>
                <div class="method-box">
                    <strong>2. Class Attributes:</strong><br>
                    Variables <strong>shared among all objects</strong>, defined directly inside the class (outside of <code>__init__</code>).
                </div>
                <div class="example-box">
<span class="keyword">class</span> Counter:
    overall_total = <span class="keyword">0</span>  <span class="comment"># Class Attribute (Shared by all)</span>

    <span class="keyword">def</span> <span class="function">__init__</span>(self):
        self.my_total = <span class="keyword">0</span>  <span class="comment"># Data Attribute (Unique to this instance)</span>
                </div>
            `
        },
        {
            title: "8. إدارة الذاكرة (Garbage Collection)",
            title_en: "8. Garbage Collection",
            badge: "مفاهيم متقدمة",
            badge_en: "Advanced Concepts",
            content: `
                <p><strong>بايثون تنظف نفسها بنفسها!</strong></p>
                <ul>
                    <li>بايثون تستخدم إدارة <strong>تلقائية</strong> للذاكرة (Automatic Memory Management).</li>
                    <li>لا يحتاج المبرمج إلى حذف الأوبجكتس من الذاكرة يدوياً.</li>
                </ul>
                <div class="method-box">
                    <strong>كيف تعمل (Garbage Collection)؟</strong><br>
                    عندما لا يكون هناك أي مرجع (Reference) يدل على الكائن (يعني مبقاش مستخدم في الكود)، يقوم بايثون <strong>بحذفه من الذاكرة تلقائياً</strong> لتوفير المساحة.
                </div>
            `,
            content_en: `
                <p><strong>Python cleans up after itself!</strong></p>
                <ul>
                    <li>Python uses <strong>Automatic Memory Management</strong>.</li>
                    <li>The programmer does not need to manually delete objects from memory.</li>
                </ul>
                <div class="method-box">
                    <strong>How does Garbage Collection work?</strong><br>
                    When there are no more references pointing to an object (it's no longer being used in the code), Python <strong>automatically deletes it from memory</strong> to free up space.
                </div>
            `
        },
        {
            title: "9. الوراثة (Inheritance)",
            title_en: "9. Inheritance",
            badge: "مفاهيم متقدمة",
            badge_en: "Advanced Concepts",
            content: `
                <p><strong>الوراثة (Inheritance):</strong> تسمح بإنشاء كلاس جديدة (Child) تأخذ كل خصائص كلاس قديمة (Parent)، مع إمكانية إضافة أو تعديل وظائف.</p>
                <div class="example-box">
<span class="comment"># الأب (Parent Class)</span>
<span class="keyword">class</span> Student:
    <span class="keyword">def</span> <span class="function">__init__</span>(self, name, age):
        self.name = name
        self.age = age

<span class="comment"># الابن (Child Class) يرث من Student</span>
<span class="keyword">class</span> Cs_student(Student):
    <span class="keyword">def</span> <span class="function">__init__</span>(self, name, age, section):
        <span class="comment"># استدعاء دالة الأب لجلب الاسم والعمر</span>
        Student.__init__(self, name, age) 
        self.section_num = section <span class="comment"># خاصية جديدة</span>
                </div>
                <div class="method-box">
                    <strong>Redefining Methods:</strong> يمكنك إعادة تعريف ميثود موجودة في الأب (مثلاً تعديل دالة الطباعة)، والميثود الجديدة في كلاس الابن <strong>ستحل محل</strong> الميثود القديمة.
                </div>
            `,
            content_en: `
                <p><strong>Inheritance:</strong> Allows creating a new class (Child) that inherits attributes and methods from an existing class (Parent), with the ability to add or modify them.</p>
                <div class="example-box">
<span class="comment"># Parent Class</span>
<span class="keyword">class</span> Student:
    <span class="keyword">def</span> <span class="function">__init__</span>(self, name, age):
        self.name = name
        self.age = age

<span class="comment"># Child Class inherits from Student</span>
<span class="keyword">class</span> Cs_student(Student):
    <span class="keyword">def</span> <span class="function">__init__</span>(self, name, age, section):
        <span class="comment"># Calling Parent's __init__ to handle name and age</span>
        Student.__init__(self, name, age) 
        self.section_num = section <span class="comment"># New attribute</span>
                </div>
                <div class="method-box">
                    <strong>Redefining Methods:</strong> You can redefine a parent's method in the child class (Method Overriding). The new method will <strong>replace</strong> the old one.
                </div>
            `
        },
        {
            title: "10. الميثودز الخاصة (Built-in) والبيانات السرية",
            title_en: "10. Special Methods & Private Data",
            badge: "مفاهيم متقدمة",
            badge_en: "Advanced Concepts",
            content: `
                <p><strong>1. الميثودز الخاصة (Special/Dunder Methods):</strong><br>
                دوال توفرها بايثون للتحكم في الأوبجكت، تبدأ وتنتهي بـ <code>__</code> (دبل أندر سكور).</p>
                <ul>
                    <li><code>__init__</code> : البناء.</li>
                    <li><code>__len__</code> : تتنفذ لما تستخدم دالة <code>len()</code>.</li>
                    <li><code>__repr__</code> : <strong>مهمة جداً!</strong> تحدد شكل الأوبجكت لما تحاول تطبعه <code>print(object)</code> وتجعله يطبع نص مفهوم بدل عنوان الذاكرة.</li>
                </ul>
                <hr style="margin: 15px 0; border-color: var(--border);">
                <p><strong>2. البيانات السرية (Private Data / Encapsulation):</strong></p>
                <p>لو عايز تخفي بيانات جوه الكلاس ومحدش يقدر يوصلها من بره، حط قبلها <code>__</code> (شرطتين تحت بعض).</p>
                <div class="example-box">
self.__age = <span class="keyword">20</span> <span class="comment"># لا يمكن لأحد خارج الكلاس قراءة أو تعديل هذا العمر!</span>
                </div>
            `,
            content_en: `
                <p><strong>1. Special Methods (Dunder Methods):</strong><br>
                Built-in functions provided by Python, starting and ending with <code>__</code>.</p>
                <ul>
                    <li><code>__init__</code> : Constructor.</li>
                    <li><code>__len__</code> : Triggered when you use <code>len()</code>.</li>
                    <li><code>__repr__</code> : <strong>Very Important!</strong> Determines how the object is represented as a string when you use <code>print(object)</code>.</li>
                </ul>
                <hr style="margin: 15px 0; border-color: var(--border);">
                <p><strong>2. Private Data (Encapsulation):</strong></p>
                <p>If you want to hide an attribute so it can't be accessed from outside the class, prefix it with <code>__</code> (double underscore).</p>
                <div class="example-box">
self.__age = <span class="keyword">20</span> <span class="comment"># No one outside the class can read or modify this age!</span>
                </div>
            `
        },
        {
            title: "11. الموديول وطرق الاستيراد (Modules & Import)",
            title_en: "11. Modules & Import Methods",
            badge: "أساسيات الملفات",
            badge_en: "File Basics",
            content: `
                <p><strong>الموديول (Module):</strong> هو ملف بايثون عادي (امتداده <code>.py</code>) يحتوي على دوال، كلاسات، ومتغيرات. يمكن استخدامه في برنامج آخر لتنظيم الكود.</p>
                <p><strong>طرق استيراد الموديول:</strong></p>
                <div class="method-box">
                    <strong>1. <code>import somefile</code></strong><br>
                    يستورد كل الملف. لكن يجب كتابة اسم الملف قبل أي وظيفة: <code>somefile.myFunc()</code>.
                </div>
                <div class="method-box">
                    <strong>2. <code>from somefile import *</code></strong><br>
                    يستورد كل العناصر مباشرة (لا حاجة لكتابة اسم الملف).<br>
                    <em>تحذير: قد يحدث تعارض لو عندك متغير بنفس الاسم في ملفك!</em>
                </div>
                <div class="method-box">
                    <strong>3. <code>from somefile import className</code></strong><br>
                    الطريقة الأفضل. تستورد شيء واحد فقط (كلاس أو دالة محددة) من الملف.
                </div>
            `,
            content_en: `
                <p><strong>Module:</strong> A regular Python file (<code>.py</code>) containing functions, classes, and variables. Used in other programs to organize code.</p>
                <p><strong>Methods of Importing:</strong></p>
                <div class="method-box">
                    <strong>1. <code>import somefile</code></strong><br>
                    Imports everything. You must prefix with the filename: <code>somefile.myFunc()</code>.
                </div>
                <div class="method-box">
                    <strong>2. <code>from somefile import *</code></strong><br>
                    Imports all elements directly (no prefix needed).<br>
                    <em>Warning: May cause naming conflicts if you have variables with the same name!</em>
                </div>
                <div class="method-box">
                    <strong>3. <code>from somefile import className</code></strong><br>
                    The best approach. Imports only one specific item (class or function) from the file.
                </div>
            `
        },
        {
            title: "12. ساحة التدريب والمحاكاة ⚔️",
            title_en: "12. Practice Arena ⚔️",
            badge: "تطبيق عملي",
            badge_en: "Practice",
            isPracticeSlide: true,
            content: `<p style="margin-bottom: 20px; font-weight: bold; color: var(--primary);">هل استوعبت مفاهيم الـ OOP؟ اكتب الكلمة البرمجية الصحيحة (بالإنجليزي) في الفراغ لتختبر نفسك!</p>`,
            content_en: `<p style="margin-bottom: 20px; font-weight: bold; color: var(--primary);">Did you grasp OOP concepts? Type the correct programming term (in English) to test yourself!</p>`
        },
        {
            title: "13. بنك الأسئلة الشامل 🎓",
            title_en: "13. Comprehensive Quiz Bank 🎓",
            badge: "مراجعة شاملة",
            badge_en: "Review",
            isQuizSlide: true,
            content: `<p style="margin-bottom: 20px; font-weight: bold; color: var(--primary);">بنك أسئلة يلخص المحاضرة بالكامل. اضغط على السؤال لإظهار الإجابة الدقيقة.</p>`,
            content_en: `<p style="margin-bottom: 20px; font-weight: bold; color: var(--primary);">A quiz bank summarizing the entire lecture. Click the question to reveal the precise answer.</p>`
        }
    ];

    const practiceQuestions = [
        { q: "القالب الأساسي الذي ننشئ منه النسخ يسمى؟", ans: "class" },
        { q: "النسخة الحقيقية التي ننشئها من القالب تسمى؟", ans: "object" },
        { q: "الميثود الخاصة (الدالة البناءة) التي يتم تشغيلها عند إنشاء الكائن هي؟", ans: "__init__" },
        { q: "الكلمة التي تشير إلى 'الكائن الحالي' داخل الكلاس هي؟", ans: "self" },
        { q: "لجعل أي بيان (Attribute) مخفي وسري (Private) نضع قبله؟", ans: "__" }
    ];

    const solvedQuizData = [
        { q_en: "ما هو الـ Module في بايثون؟", 
          a_ar: "الحل: هو ملف بايثون عادي امتداده .py يحتوي على دوال، كلاسات، ومتغيرات، ويتم استخدامه داخل برنامج آخر لترتيب الكود.", 
          a_en: "Answer: A regular Python file (.py) containing functions, classes, and variables used in other programs to organize code." },
        { q_en: "كيف يقوم بايثون بحذف الأوبجكتس من الذاكرة (Garbage Collection)؟", 
          a_ar: "الحل: يستخدم نظام إدارة تلقائية للذاكرة. عندما لا يكون هناك أي مرجع للكائن في الكود، يقوم بايثون بحذفه لتوفير المساحة.", 
          a_en: "Answer: It uses automatic memory management. When there are no references to an object, Python automatically deletes it." },
        { q_en: "ما الفرق بين Data Attributes و Class Attributes؟", 
          a_ar: "الحل: الـ Data Attributes خاصة بكل أوبجكت لوحده (مثل الاسم). أما الـ Class Attributes فهي قيم ثابتة مشتركة بين كل الأوبجكتس.", 
          a_en: "Answer: Data attributes are unique to each object. Class attributes are shared variables among all objects." },
        { q_en: "ما هي فائدة الوراثة (Inheritance)؟", 
          a_ar: "الحل: تسمح بإنشاء كلاس جديدة (ابن) تعتمد على كلاس قديمة (أب) وتأخذ خصائصها ووظائفها لتوفير إعادة كتابة الكود.", 
          a_en: "Answer: Allows creating a new child class based on an existing parent class to inherit its properties and reuse code." },
        { q_en: "ما هي فائدة الدالة الخاصة __repr__ ؟", 
          a_ar: "الحل: تحدد شكل وطريقة عرض الأوبجكت عند طباعته (print) لتظهر كنص مفهوم بدلاً من عنوان الذاكرة المبهم.", 
          a_en: "Answer: Determines how the object is represented as a readable string when passed to the print() function." }
    ];

    let idx = 0;
    let uiLang = localStorage.getItem('globalLang') || 'ar'; 

    const dom = {
        title: document.getElementById('slideHeader'),
        content: document.getElementById('slideHtml'),
        badge: document.getElementById('slideBadge'),
        list: document.getElementById('list'),
        prev: document.querySelector('#prevBtn span:first-child'),
        next: document.querySelector('#nextBtn span:first-child'),
        sidebar: document.getElementById('sidebar'),
        pracContainer: document.getElementById('practiceContainer'),
        quizContainer: document.getElementById('quizContainer'),
        search: document.getElementById('searchInp'),
        langBtn: document.getElementById('langBtn')
    };

    function init() {
        initGlobalSettings();
        renderList();
        loadSlide(0);
    }

    function renderList() {
        dom.list.innerHTML = '';
        const isAr = uiLang === 'ar';
        slides.forEach((s, i) => {
            let li = document.createElement('li');
            li.className = 'list-item';
            let icon = s.isPracticeSlide ? '⚔️' : (s.isQuizSlide ? '🎓' : (i+1));
            let titleText = isAr ? s.title : s.title_en;
            let shortTitle = titleText.split('(')[0].split(':')[0]; 
            li.innerHTML = `<span>${shortTitle}</span> <span style="opacity:0.6; font-size:0.8rem;">${icon}</span>`;
            li.onclick = () => { loadSlide(i); if(window.innerWidth <= 900) toggleSidebar(); };
            dom.list.appendChild(li);
        });
        updateActiveItem(idx);
    }

    function loadSlide(index) {
        idx = index;
        const s = slides[index];
        const isAr = uiLang === 'ar';

        dom.title.innerHTML = isAr ? s.title : s.title_en;
        dom.badge.innerText = isAr ? s.badge : s.badge_en;
        dom.content.innerHTML = isAr ? s.content : s.content_en;

        dom.pracContainer.style.display = 'none';
        dom.quizContainer.style.display = 'none';

        if (s.isPracticeSlide) {
            dom.pracContainer.style.display = 'block';
            renderPractice();
        }
        
        if (s.isQuizSlide) {
            dom.quizContainer.style.display = 'block';
            renderQuiz();
        }

        document.getElementById('prevBtn').disabled = index === 0;
        document.getElementById('nextBtn').disabled = index === slides.length - 1;

        updateActiveItem(index);
        
        // إعادة التمرير لأعلى الشريحة عند التبديل
        document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updateActiveItem(index) {
        const items = document.querySelectorAll('.list-item');
        items.forEach((item, i) => {
            if(i === index) item.classList.add('active');
            else item.classList.remove('active');
        });
    }

    function renderPractice() {
        dom.pracContainer.innerHTML = '';
        const isAr = uiLang === 'ar';
        practiceQuestions.forEach((item, i) => {
            let div = document.createElement('div');
            div.className = 'practice-item';
            let btnText = isAr ? "تحقق" : "Check";
            let plcHolder = isAr ? "اكتب الإجابة (إنجليزي)..." : "Type answer here...";
            div.innerHTML = `
                <div class="practice-q">س${i+1}: ${item.q}</div>
                <div class="practice-controls">
                    <input type="text" class="practice-input" id="prac_inp_${i}" placeholder="${plcHolder}" autocomplete="off" dir="ltr" style="text-align: left;">
                    <button class="btn-check" onclick="window.checkAns(${i}, '${item.ans}')">${btnText}</button>
                    <span class="feedback" id="prac_fb_${i}"></span>
                </div>
            `;
            dom.pracContainer.appendChild(div);
        });
    }

    function renderQuiz() {
        dom.quizContainer.innerHTML = '';
        const isAr = uiLang === 'ar';
        solvedQuizData.forEach((item, i) => {
            let div = document.createElement('div');
            div.className = 'quiz-item';
            let ansText = isAr ? item.a_ar : item.a_en;
            div.innerHTML = `
                <div class="quiz-q" onclick="this.parentElement.classList.toggle('revealed')">
                    <span style="direction: rtl; display: inline-block;">س${i+1}: ${item.q_en}</span>
                    <span style="font-size:1.2rem;">▼</span>
                </div>
                <div class="quiz-a">${ansText}</div>
            `;
            dom.quizContainer.appendChild(div);
        });
    }

    function filterSlides() {
        const q = dom.search.value.toLowerCase();
        const items = document.querySelectorAll('.list-item');
        const isAr = uiLang === 'ar';
        slides.forEach((s, i) => {
            let t = isAr ? s.title.toLowerCase() : s.title_en.toLowerCase();
            let b = isAr ? s.badge.toLowerCase() : s.badge_en.toLowerCase();
            if(t.includes(q) || b.includes(q)) items[i].style.display = 'flex';
            else items[i].style.display = 'none';
        });
    }

    window.toggleLang = function() {
        uiLang = uiLang === 'ar' ? 'en' : 'ar';
        localStorage.setItem('globalLang', uiLang);
        const isAr = uiLang === 'ar';
        
        dom.langBtn.setAttribute('data-main', isAr ? "🇺🇸 English" : "🇪🇬 العربية");
        dom.langBtn.setAttribute('data-hover', isAr ? "Switch ⇆" : "تغيير ⇆");

        document.getElementById('pageTitle').innerText = isAr ? "المحاضرة الرابعة: البرمجة الكائنية 💻" : "Lecture 4: Python OOP 💻";
        document.getElementById('pageSubTitle').innerText = isAr ? "OOP in Python | د. محمود" : "OOP in Python | Dr. Mahmoud";
        
        dom.search.placeholder = isAr ? "ابحث في الشرح..." : "Search in slides...";
        document.getElementById('searchIcon').style.right = isAr ? "15px" : "auto";
        document.getElementById('searchIcon').style.left = isAr ? "auto" : "15px";

        dom.prev.innerText = isAr ? "السابق" : "Prev";
        dom.next.innerText = isAr ? "التالي" : "Next";
        
        document.documentElement.dir = isAr ? 'rtl' : 'ltr';
        document.documentElement.lang = isAr ? 'ar' : 'en';
        
        renderList();
        loadSlide(idx);
    }

    window.checkAns = function(index, correctAns) {
        const inputEl = document.getElementById(`prac_inp_${index}`);
        const fbEl = document.getElementById(`prac_fb_${index}`);
        if(!inputEl || !fbEl) return;
        
        const isAr = uiLang === 'ar';
        let userAns = inputEl.value.trim().toLowerCase();
        let targetAns = correctAns.trim().toLowerCase();

        if (userAns === "") {
            fbEl.innerText = isAr ? "اكتب إجابة أولاً!" : "Enter an answer first!";
            fbEl.className = "feedback wrong";
            return;
        }

        if (userAns.includes(targetAns) || targetAns.includes(userAns)) {
            fbEl.innerText = isAr ? "إجابة صحيحة! ✔️" : "Correct Answer! ✔️";
            fbEl.className = "feedback correct";
        } else {
            fbEl.innerText = isAr ? "حاول مرة أخرى ❌" : "Try again ❌";
            fbEl.className = "feedback wrong";
        }
    };

    window.move = function(step) {
        const newIdx = idx + step;
        if(newIdx >= 0 && newIdx < slides.length) loadSlide(newIdx);
    }

    window.toggleSidebar = function() { dom.sidebar.classList.toggle('open'); }

    window.toggleTheme = function() {
        const body = document.body;
        const isLight = body.getAttribute('data-theme') === 'light';
        const newTheme = isLight ? 'dark' : 'light';
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('globalTheme', newTheme);
        
        const headerToggle = document.getElementById('themeCheckbox');
        if(headerToggle) headerToggle.checked = (newTheme === 'dark');
    }

    function initGlobalSettings() {
        const savedTheme = localStorage.getItem('globalTheme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);
        const headerToggle = document.getElementById('themeCheckbox');
        if(headerToggle) headerToggle.checked = (savedTheme === 'dark');

        uiLang = localStorage.getItem('globalLang') || 'ar';
        
        if(uiLang === 'en') {
            uiLang = 'ar'; 
            window.toggleLang(); 
        } else {
            dom.langBtn.setAttribute('data-main', "🇺🇸 English");
            dom.langBtn.setAttribute('data-hover', "Switch ⇆");
            document.getElementById('pageSubTitle').innerText = "OOP in Python | د. محمود";
        }
    }

    window.onload = init;
</script>
</body>
</html>
