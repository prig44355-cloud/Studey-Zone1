<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عرض الـ PDF | المحاضرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* الألوان متوافقة مع مبادئ التكنولوجيا أو يمكنك تغييرها لأي مادة */
            --bg-gradient-light: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --text-main-light: #2d3748; --primary-light: #2b6cb0; --accent-light: #38b2ac;  
            --header-bg-light: rgba(255, 255, 255, 0.98); --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        [data-theme="dark"] {
            --bg-gradient-dark: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --text-main-dark: #f1f5f9; --primary-dark: #63b3ed; --accent-dark: #4fd1c5;
            --header-bg-dark: rgba(15, 23, 42, 0.98); --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        body { --bg-body: var(--bg-gradient-light); --text: var(--text-main-light); --primary: var(--primary-light); --accent: var(--accent-light); --header-bg: var(--header-bg-light); }
        [data-theme="dark"] body { --bg-body: var(--bg-gradient-dark); --text: var(--text-main-dark); --primary: var(--primary-dark); --accent: var(--accent-dark); --header-bg: var(--header-bg-dark); }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        html, body { height: 100%; overflow: hidden; display: flex; flex-direction: column; background: var(--bg-body); color: var(--text); }

        /* الهيدر */
        header { height: 80px; background: var(--header-bg); backdrop-filter: blur(12px); border-bottom: 2px solid var(--primary); display: flex; align-items: center; padding: 0 20px; z-index: 1000; box-shadow: var(--shadow); position: relative; flex-shrink: 0; }
        .header-title-container { text-align: center; position: absolute; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center;}
        .header-title { font-weight: 900; font-size: 1.1rem; color: var(--primary); display: flex; align-items: center; gap: 8px;}
        
        /* زر الرجوع */
        .cta-back { display: flex; align-items: center; padding: 6px 15px; text-decoration: none; font-size: 16px; font-weight: bold; color: white; background: var(--primary); transition: 1s; box-shadow: -4px 4px 0 var(--text); transform: skewX(15deg); border: none; cursor: pointer; z-index: 2;}
        [data-theme="dark"] .cta-back { box-shadow: -4px 4px 0 #ffffff; color: #000; }
        .cta-back:hover { box-shadow: -6px 6px 0 var(--accent); }
        .cta-back .span { transform: skewX(-15deg); font-family: 'Cairo'; }
        .cta-back .second { margin-left: 0; margin-right: 10px; width: 20px; transform: rotate(180deg); transition: 0.5s; display: flex;}
        .cta-back:hover .second { margin-right: 20px; }

        /* حاوية الـ PDF */
        .container { flex: 1; display: flex; flex-direction: column; background: #2a2a2a; position: relative; height: 100%; width: 100%;}
        iframe, object { flex: 1; width: 100%; height: 100%; border: none; }

        /* شريط الموبايل الذكي (يظهر فقط في الموبايل) */
        .mobile-action-bar {
            display: none; background: var(--header-bg); padding: 15px; text-align: center;
            border-bottom: 2px solid var(--accent); z-index: 10;
        }
        .mobile-action-bar p { font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; color: var(--text); }
        .btn-direct {
            display: inline-flex; align-items: center; gap: 10px; padding: 10px 25px;
            background: var(--primary); color: white; text-decoration: none; border-radius: 8px;
            font-weight: 900; font-size: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .btn-direct:hover { background: var(--accent); transform: scale(1.05); }

        /* تظبيط الموبايل */
        @media (max-width: 768px) {
            header { padding: 0 10px; height: 70px; }
            .header-title-container { position: static; transform: none; flex: 1; text-align: right; align-items: flex-start;}
            [dir="ltr"] .header-title-container { text-align: left; }
            .header-title { font-size: 1rem; }
            .cta-back { padding: 5px 10px; font-size: 14px; }
            .cta-back .span { display: none; } 
            .cta-back .second { margin-right: 0; width: 18px; }
            
            /* إظهار شريط التحميل/الفتح للموبايل */
            .mobile-action-bar { display: block; }
        }
    </style>
</head>
<body>
    
    <header>
        <button class="cta-back" onclick="window.location.href='index.html'">
            <span class="second"><svg viewBox="0 0 66 43" version="1.1" xmlns="http://www.w3.org/2000/svg"><g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd"><path d="M40.15,3.89 L43.97,0.13 L65.69,20.78 L44.67,42.86 L40.15,39.10 L56.99,21.85 Z" fill="#FFFFFF"></path><path d="M20.15,3.89 L23.97,0.13 L45.69,20.78 L24.67,42.86 L20.15,39.10 L36.99,21.85 Z" fill="#FFFFFF"></path><path d="M0.15,3.89 L3.97,0.13 L25.69,20.78 L4.67,42.86 L0.15,39.10 L16.99,21.85 Z" fill="#FFFFFF"></path></g></svg></span>
            <span class="span">رجوع</span>
        </button>

        <div class="header-title-container">
            <div class="header-title" id="pageTitle"><i class="fa-solid fa-file-pdf"></i> ماتيريال المحاضرة</div>
        </div>
    </header>

    <div class="container">
        <div class="mobile-action-bar">
            <p id="mobileMsg">اذا لم يظهر الملف بشكل صحيح، افتحه مباشرة 👇</p>
            <a href="Principles of Technology Ch 1.pdf" target="_blank" class="btn-direct">
                <i class="fa-solid fa-download"></i> <span id="mobileBtnTxt">فتح / تحميل الـ PDF</span>
            </a>
        </div>
        
        <iframe src="02_OOP-python3 (1)(1).pdf"></iframe>
    </div>

    <script>
        function initSettings() {
            const savedTheme = localStorage.getItem('globalTheme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const savedLang = localStorage.getItem('globalLang') || 'ar';
            document.documentElement.lang = savedLang;
            document.documentElement.dir = savedLang === 'ar' ? 'rtl' : 'ltr';

            if (savedLang === 'en') {
                document.title = "PDF Viewer | Lecture";
                document.getElementById('pageTitle').innerHTML = '<i class="fa-solid fa-file-pdf"></i> Lecture Material';
                document.querySelector('.cta-back .span').innerText = "Back";
                document.getElementById('mobileMsg').innerText = "If the file doesn't display, open it directly 👇";
                document.getElementById('mobileBtnTxt').innerText = "Open / Download PDF";
            }
        }
        window.onload = initSettings;
    </script>
</body>
</html>
