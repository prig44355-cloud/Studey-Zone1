<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برمجة الذكاء الاصطناعي | المنصة التعليمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f0f4f8; 
            --text-main: #1e293b; 
            --header-bg: #ffffff;
            --card-active: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            --card-locked: linear-gradient(135deg, #e2ebf0 0%, #cfd9df 100%);
            --text-locked: #475569;
        }
        [data-theme="dark"] {
            --bg-body: #05071b; 
            --text-main: #f8fafc; 
            --header-bg: #05071b;
            --card-active: linear-gradient(135deg, #db2777 0%, #9d174d 100%);
            --card-locked: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --text-locked: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
        body { background: var(--bg-body); color: var(--text-main); min-height: 100vh; overflow-x: hidden; -webkit-user-select: none; user-select: none; }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--header-bg); padding: 15px 5%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 15px;
        }
        .page-title { font-size: 1.5rem; font-weight: 900; color: var(--text-main); display: flex; align-items: center; gap: 10px; }

        .cta-back { 
            display: flex; align-items: center; padding: 8px 25px; text-decoration: none; font-size: 18px; 
            font-weight: bold; color: white; background: #6225e6; transition: 1s; 
            box-shadow: -5px 5px 0 var(--text-main); transform: skewX(15deg); border: none; cursor: pointer; 
        }
        [data-theme="dark"] .cta-back { background: #db2777; }
        .cta-back:focus { outline: none; }
        .cta-back:hover { transition: 0.5s; box-shadow: -8px 8px 0 #fbc638; }
        .cta-back .span { transform: skewX(-15deg); font-family: 'Cairo'; }
        .cta-back .second { transition: 0.5s; margin-left: 0; margin-right: 15px; width: 25px; transform: rotate(180deg); display: flex; align-items: center;}
        .cta-back:hover .second { transition: 0.5s; margin-right: 35px; }
        .one { transition: 0.4s; transform: translateX(-60%); }
        .two { transition: 0.5s; transform: translateX(-30%); }
        .cta-back:hover .three { animation: color_anim 1s infinite 0.2s; }
        .cta-back:hover .one { transform: translateX(0%); animation: color_anim 1s infinite 0.6s; }
        .cta-back:hover .two { transform: translateX(0%); animation: color_anim 1s infinite 0.4s; }
        @keyframes color_anim { 0% { fill: white; } 50% { fill: #fbc638; } 100% { fill: white; } }

        .container { max-width: 1200px; margin: 50px auto; padding: 0 5%; }
        .title { text-align: center; font-size: 1.8rem; font-weight: 900; margin-bottom: 50px; color: var(--text-main); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 35px; direction: rtl; }

        .lec-card {
            border-radius: 40px 10px 40px 10px; padding: 40px 20px 30px; 
            position: relative; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            display: flex; flex-direction: column; transition: transform 0.4s, box-shadow 0.4s; 
            border: 1px solid rgba(255,255,255,0.2);
        }

        .active-card { background: var(--card-active); color: white; cursor: pointer; }
        .active-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(219, 39, 119, 0.3); }
        
        .floating-icon {
            position: absolute; top: -20px; right: -15px;
            background: var(--header-bg); width: 65px; height: 65px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); border: 4px solid var(--bg-body); transition: 0.3s;
            color: #db2777;
        }

        /* تعديل اتجاه الأيقونة العائمة عند التبديل للغة الإنجليزية LTR */
        html[dir="ltr"] .floating-icon { right: auto; left: -15px; }

        .lec-card h3 { font-size: 1.5rem; margin-bottom: 15px; font-weight: 900; }
        .lec-card p { margin-bottom: 30px; flex-grow: 1; font-size: 1rem; opacity: 0.9;}
        
        .btn-glass {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5); color: white;
            padding: 12px 30px; border-radius: 20px; text-decoration: none; font-weight: bold;
            font-size: 1.1rem; display: block; transition: 0.3s; margin: auto auto 0; width: 100%;
        }
        .btn-glass:hover { background: white; color: #db2777; box-shadow: 0 5px 15px rgba(255,255,255,0.4); }

        .locked-card { background: var(--card-locked); color: var(--text-locked); border: 1px dashed var(--text-locked); opacity: 0.8;}
        .locked-card .floating-icon { color: var(--text-locked); filter: grayscale(100%); }
        
        .spinner-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: auto;}
        .spinner { 
            width: 3em; height: 3em; border-radius: 50%; border: 2px solid transparent; 
            box-shadow: -10px -10px 10px #6359f8, 0px -10px 10px 0px #9c32e2, 10px -10px 10px #f36896, 10px 0 10px #ff0b0b, 10px 10px 10px 0px #ff5500, 0 10px 10px 0px #ff9500, -10px 10px 10px 0px #ffb700; 
            animation: rot55 0.7s linear infinite; position: relative;
        }
        .spinnerin { border: 2px solid var(--text-locked); width: 1.5em; height: 1.5em; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        @keyframes rot55 { to { transform: rotate(360deg); } }

        /* التجاوب (Responsive Design) */
        @media (max-width: 768px) { 
            .navbar { justify-content: center; } 
            .page-title { font-size: 1.3rem; text-align: center; }
            .floating-icon { top: -20px; right: -10px; width: 55px; height: 55px; font-size: 18px;}
            html[dir="ltr"] .floating-icon { left: -10px; right: auto; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        }

        @media (max-width: 480px) {
            .navbar { flex-direction: column-reverse; gap: 15px; padding: 15px; }
            .cta-back { font-size: 15px; padding: 6px 20px; }
            .title { font-size: 1.5rem; margin-bottom: 30px; }
            /* جعل التصميم بعمود واحد وتجنب الخروج عن حواف الشاشة */
            .grid { grid-template-columns: 1fr; gap: 30px; }
            .lec-card { padding: 35px 15px 20px; }
            .lec-card h3 { font-size: 1.3rem; }
            .btn-glass { font-size: 1rem; padding: 10px 20px; }
        }
    </style>
</head>
<body>
    
    <header class="navbar">
        <h2 class="page-title">🤖 برمجة الذكاء الاصطناعي</h2>
        <button class="cta-back" onclick="window.location.href='../index.html'">
            <span class="second"><svg viewBox="0 0 66 43" version="1.1" xmlns="http://www.w3.org/2000/svg"><g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd"><path class="one" d="M40.15,3.89 L43.97,0.13 L65.69,20.78 L44.67,42.86 L40.15,39.10 L56.99,21.85 Z" fill="#FFFFFF"></path><path class="two" d="M20.15,3.89 L23.97,0.13 L45.69,20.78 L24.67,42.86 L20.15,39.10 L36.99,21.85 Z" fill="#FFFFFF"></path><path class="three" d="M0.15,3.89 L3.97,0.13 L25.69,20.78 L4.67,42.86 L0.15,39.10 L16.99,21.85 Z" fill="#FFFFFF"></path></g></svg></span>
            <span class="span">الرئيسية</span>
        </button>
    </header>

    <main class="container">
        <h1 class="title">قائمة المحاضرات 📚</h1>
        <div class="grid">

            <div class="lec-card active-card" onclick="window.location.href='Lectures_1_to_3/index.html'">
                <div class="floating-icon">1</div>
                <h3>المحاضرات (1 إلى 3)</h3>
                <p>محتوى مدمج لأساسيات لغة بايثون.</p>
                <a href="Lectures_1_to_3/index.html" class="btn-glass">دخول للمحاضرة</a>
            </div>
            
            <div class="lec-card active-card" onclick="window.location.href='Lectures4/index.html'">
                <div class="floating-icon">4</div>
                <h3>المحاضرة الرابعة</h3>
                <p>شرح وتفريغ المحاضرة الرابعة: البرمجة الكائنية (OOP).<br>
                   <span style="color: #ff9a9e; font-weight: bold; font-size: 0.9rem;"></span>
                </p> 
                <a href="Lectures4/index.html" class="btn-glass">دخول للمحاضرة</a>
            </div>

            <div class="lec-card locked-card">
                <div class="floating-icon">5</div>
                <h3>المحاضرة الخامسة</h3>
                <div class="spinner-container">
                    <div class="spinner"><div class="spinnerin"></div></div>
                    <span style="font-weight:bold;" class="locked-status">جاري التجهيز...</span>
                </div>
            </div>

        </div>
    </main>

    <script>
        let globalTheme = localStorage.getItem('globalTheme') || 'light';
        let globalLang = localStorage.getItem('globalLang') || 'ar';

        function initSubPage() {
            document.documentElement.setAttribute('data-theme', globalTheme);
            document.documentElement.lang = globalLang;
            document.documentElement.dir = globalLang === 'ar' ? 'rtl' : 'ltr';
            
            if (globalLang === 'en') {
                // ترجمة العناصر الأساسية
                document.querySelector('.page-title').innerText = '🤖 AI Programming';
                document.querySelector('.span').innerText = 'Home';
                document.querySelector('.title').innerText = 'Lectures List 📚';

                // ترجمة محتوى الكروت حتى يكتمل تجاوب الصفحة مع اللغة
                const cardsH3 = document.querySelectorAll('.lec-card h3');
                const cardsP = document.querySelectorAll('.lec-card p');
                const cardsBtn = document.querySelectorAll('.lec-card .btn-glass');
                const lockedStatus = document.querySelector('.locked-status');

                if (cardsH3.length >= 3) {
                    cardsH3[0].innerText = 'Lectures (1 to 3)';
                    cardsP[0].innerText = 'Combined content for Python basics.';
                    cardsBtn[0].innerText = 'Enter Lecture';

                    cardsH3[1].innerText = 'Lecture 4';
                    cardsP[1].innerHTML = 'Explanation & transcript of Lecture 4: Object-Oriented Programming (OOP).';
                    cardsBtn[1].innerText = 'Enter Lecture';

                    cardsH3[2].innerText = 'Lecture 5';
                    if (lockedStatus) lockedStatus.innerText = 'Preparing...';
                }
            }
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.ondragstart = () => false;
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || e.keyCode === 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'C')) return false;
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 'P')) return false;
        });

        window.onload = initSubPage;
    </script>
</body>
</html>
