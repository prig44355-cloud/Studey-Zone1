<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>برمجة الذكاء الاصطناعي | المنصة التعليمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f0f4f8; 
            --text-main: #1e293b; 
            --header-bg: #ffffff;
            --card-active: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            --card-locked: linear-gradient(135deg, #e2ebf0 0%, #cfd9df 100%);
            --text-locked: #475569;
        }
        [data-theme="dark"] {
            --bg-body: #05071b; 
            --text-main: #f8fafc; 
            --header-bg: #05071b;
            --card-active: linear-gradient(135deg, #db2777 0%, #9d174d 100%);
            --card-locked: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --text-locked: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
        body { background: var(--bg-body); color: var(--text-main); min-height: 100vh; overflow-x: hidden; -webkit-user-select: none; user-select: none; }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--header-bg); padding: 15px 5%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 15px;
        }
        .page-title { font-size: 1.5rem; font-weight: 900; color: var(--text-main); display: flex; align-items: center; gap: 10px; }

        .cta-back { 
            display: flex; align-items: center; justify-content: center; padding: 8px 25px; text-decoration: none; font-size: 18px; 
            font-weight: bold; color: white; background: #6225e6; transition: 1s; 
            box-shadow: -5px 5px 0 var(--text-main); transform: skewX(15deg); border: none; cursor: pointer; 
        }
        [data-theme="dark"] .cta-back { background: #db2777; box-shadow: -5px 5px 0 #ffffff; }
        .cta-back:focus { outline: none; }
        .cta-back:hover { transition: 0.5s; box-shadow: -8px 8px 0 #fbc638; }
        .cta-back .span { transform: skewX(-15deg); font-family: 'Cairo'; }
        .cta-back .second { transition: 0.5s; margin-left: 0; margin-right: 15px; width: 25px; transform: rotate(180deg); display: flex; align-items: center;}
        .cta-back:hover .second { transition: 0.5s; margin-right: 35px; }
        .one { transition: 0.4s; transform: translateX(-60%); }
        .two { transition: 0.5s; transform: translateX(-30%); }
        .cta-back:hover .three { animation: color_anim 1s infinite 0.2s; }
        .cta-back:hover .one { transform: translateX(0%); animation: color_anim 1s infinite 0.6s; }
        .cta-back:hover .two { transform: translateX(0%); animation: color_anim 1s infinite 0.4s; }
        @keyframes color_anim { 0% { fill: white; } 50% { fill: #fbc638; } 100% { fill: white; } }

        .container { max-width: 1200px; margin: 50px auto; padding: 0 5%; }
        .title { text-align: center; font-size: 1.8rem; font-weight: 900; margin-bottom: 50px; color: var(--text-main); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 35px; direction: rtl; }

        .lec-card {
            border-radius: 40px 10px 40px 10px; padding: 40px 20px 30px; 
            position: relative; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            display: flex; flex-direction: column; transition: transform 0.4s, box-shadow 0.4s; 
            border: 1px solid rgba(255,255,255,0.2);
        }

        .active-card { background: var(--card-active); color: white; cursor: pointer; }
        .active-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(219, 39, 119, 0.3); }
        
        .floating-icon {
            position: absolute; top: -20px; right: -15px;
            background: var(--header-bg); width: 65px; height: 65px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); border: 4px solid var(--bg-body); transition: 0.3s;
            color: #db2777;
        }

        html[dir="ltr"] .floating-icon { right: auto; left: -15px; }

        .lec-card h3 { font-size: 1.5rem; margin-bottom: 15px; font-weight: 900; }
        .lec-card p { margin-bottom: 30px; flex-grow: 1; font-size: 1rem; opacity: 0.9;}
        
        .btn-glass {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5); color: white;
            padding: 12px 30px; border-radius: 20px; text-decoration: none; font-weight: bold;
            font-size: 1.1rem; display: block; transition: 0.3s; margin: auto auto 0; width: 100%;
        }
        .btn-glass:hover { background: white; color: #db2777; box-shadow: 0 5px 15px rgba(255,255,255,0.4); }

        .locked-card { background: var(--card-locked); color: var(--text-locked); border: 1px dashed var(--text-locked); opacity: 0.8;}
        .locked-card .floating-icon { color: var(--text-locked); filter: grayscale(100%); }
        
        .spinner-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: auto;}
        .spinner { 
            width: 3em; height: 3em; border-radius: 50%; border: 2px solid transparent; 
            box-shadow: -10px -10px 10px #6359f8, 0px -10px 10px 0px #9c32e2, 10px -10px 10px #f36896, 10px 0 10px #ff0b0b, 10px 10px 10px 0px #ff5500, 0 10px 10px 0px #ff9500, -10px 10px 10px 0px #ffb700; 
            animation: rot55 0.7s linear infinite; position: relative;
        }
        .spinnerin { border: 2px solid var(--text-locked); width: 1.5em; height: 1.5em; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        @keyframes rot55 { to { transform: rotate(360deg); } }

        /* ================= التجاوب (Responsive Design Fixes) ================= */
        @media (max-width: 768px) { 
            .navbar { justify-content: space-between; } 
            .page-title { font-size: 1.3rem; text-align: right; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
            .lec-card { border-radius: 25px 8px 25px 8px; margin-top: 15px; }
            .floating-icon { top: -25px; right: 15px; width: 55px; height: 55px; font-size: 20px;}
            html[dir="ltr"] .floating-icon { left: 15px; right: auto; }
        }

        @media (max-width: 480px) {
            .navbar { flex-direction: row; gap: 10px; padding: 15px; flex-wrap: nowrap;}
            .page-title { font-size: 1.1rem; gap: 5px; flex: 1;}
            .cta-back { width: auto; font-size: 13px; padding: 6px 15px; transform: skewX(10deg); box-shadow: -3px 3px 0 var(--text-main);}
            [data-theme="dark"] .cta-back { box-shadow: -3px 3px 0 #ffffff; }
            .cta-back .span { transform: skewX(-10deg); }
            .cta-back .second { width: 18px; margin-right: 8px;}
            .cta-back:hover .second { margin-right: 15px; }
            .title { font-size: 1.4rem; margin-bottom: 35px; }
            .grid { grid-template-columns: 1fr; gap: 35px; }
            .lec-card { border-radius: 20px 5px 20px 5px; padding: 35px 15px 20px; margin-top: 20px;}
            .floating-icon { width: 50px; height: 50px; font-size: 18px; top: -25px; right: 15px; border-width: 3px; }
            html[dir="ltr"] .floating-icon { left: 15px; right: auto; }
            .lec-card h3 { font-size: 1.3rem; margin-bottom: 10px; }
            .btn-glass { font-size: 1rem; padding: 10px 20px; }
        }
    </style>
</head>
<body>
    
    <header class="navbar">
        <h2 class="page-title">🤖 برمجة الذكاء الاصطناعي</h2>
        <button class="cta-back" onclick="window.location.href='../index.html'">
            <span class="second"><svg viewBox="0 0 66 43" version="1.1" xmlns="http://www.w3.org/2000/svg"><g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd"><path class="one" d="M40.15,3.89 L43.97,0.13 L65.69,20.78 L44.67,42.86 L40.15,39.10 L56.99,21.85 Z" fill="#FFFFFF"></path><path class="two" d="M20.15,3.89 L23.97,0.13 L45.69,20.78 L24.67,42.86 L20.15,39.10 L36.99,21.85 Z" fill="#FFFFFF"></path><path class="three" d="M0.15,3.89 L3.97,0.13 L25.69,20.78 L4.67,42.86 L0.15,39.10 L16.99,21.85 Z" fill="#FFFFFF"></path></g></svg></span>
            <span class="span">الرئيسية</span>
        </button>
    </header>

    <main class="container">
        <h1 class="title">قائمة المحاضرات 📚</h1>
        <div class="grid" id="lectures-grid"></div>
    </main>

    <script>
        let globalTheme = localStorage.getItem('globalTheme') || 'light';
        let globalLang = localStorage.getItem('globalLang') || 'ar';

        function initSubPage() {
            document.documentElement.setAttribute('data-theme', globalTheme);
            document.documentElement.lang = globalLang;
            document.documentElement.dir = globalLang === 'ar' ? 'rtl' : 'ltr';
            
            if (globalLang === 'en') {
                document.querySelector('.page-title').innerText = '🤖 AI Programming';
                document.querySelector('.span').innerText = 'Home';
                document.querySelector('.title').innerText = 'Lectures List 📚';
            }

            // تمت إضافة المحاضرات حتى 14 هنا
            const activeLectures = [
                { id: 1, titleAr: 'المحاضرة الأولى', titleEn: 'Lecture 1', descAr: 'مقدمة في لغة بايثون والبيئة التطويرية.', descEn: 'Introduction to Python and Environment.', link: 'Lectures1/index.html' },
                { id: 2, titleAr: 'المحاضرة الثانية', titleEn: 'Lecture 2', descAr: 'المتغيرات وأنواع البيانات الأساسية.', descEn: 'Variables and Basic Data Types.', link: 'Lectures2/index.html' },
                { id: 3, titleAr: 'المحاضرة الثالثة', titleEn: 'Lecture 3', descAr: 'الجمل الشرطية وحلقات التكرار.', descEn: 'Conditionals and Loops.', link: 'Lectures3/index.html' },
                { id: 4, titleAr: 'المحاضرة الرابعة', titleEn: 'Lecture 4', descAr: 'البرمجة الكائنية (OOP).', descEn: 'Object-Oriented Programming (OOP).', link: 'Lectures4/index.html' },
                { id: 5, titleAr: 'المحاضرة الخامسة', titleEn: 'Lecture 5', descAr: 'التعامل مع الملفات (File Handling).', descEn: 'File Handling in Python.', link: 'Lectures5/index.html' },
                { id: 6, titleAr: 'المحاضرة السادسة', titleEn: 'Lecture 6', descAr: 'التعامل مع المصفوفات باستخدام (NumPy).', descEn: 'Handling arrays using NumPy.', link: 'Lectures6/index.html' },
                { id: 7, titleAr: 'المحاضرة السابعة', titleEn: 'Lecture 7', descAr: 'الرسم البياني وتصور البيانات (Matplotlib).', descEn: 'Data visualization and plotting (Matplotlib).', link: 'Lectures7/index.html' },
                { id: 8, titleAr: 'المحاضرة الثامنة', titleEn: 'Lecture 8', descAr: 'تحليل ومعالجة البيانات باستخدام (Pandas).', descEn: 'Data analysis and manipulation (Pandas).', link: 'Lectures8/index.html' },
                { id: 9, titleAr: 'المحاضرة التاسعة', titleEn: 'Lecture 9', descAr: 'مقدمة في تعلم الآلة (Machine Learning).', descEn: 'Introduction to Machine Learning.', link: 'Lectures9/index.html' },
                { id: 10, titleAr: 'المحاضرة العاشرة', titleEn: 'Lecture 10', descAr: 'التصنيف باستخدام (Scikit-Learn).', descEn: 'Classification using Scikit-Learn.', link: 'Lectures10/index.html' },
                { id: 11, titleAr: 'المحاضرة الحادية عشرة', titleEn: 'Lecture 11', descAr: 'الانحدار وتوقع الأرقام (Regression).', descEn: 'Regression algorithms.', link: 'Lectures11/index.html' },
                { id: 12, titleAr: 'المحاضرة الثانية عشرة', titleEn: 'Lecture 12', descAr: 'التجميع غير الخاضع للإشراف (Clustering).', descEn: 'Unsupervised Clustering.', link: 'Lectures12/index.html' },
                { id: 13, titleAr: 'المحاضرة الثالثة عشرة', titleEn: 'Lecture 13', descAr: 'معالجة وتجهيز البيانات (Data Preprocessing).', descEn: 'Data Preprocessing in Scikit-Learn.', link: 'Lectures13/index.html' },
                { id: 14, titleAr: 'المحاضرة الرابعة عشرة', titleEn: 'Lecture 14', descAr: 'التعلم العميق باستخدام (TensorFlow & Keras).', descEn: 'Deep Learning with TensorFlow & Keras.', link: 'Lectures14/index.html' }
            ];

            const grid = document.getElementById('lectures-grid');
            grid.innerHTML = ''; 

            for (let i = 1; i <= 15; i++) {
                const card = document.createElement('div');
                
                // يفتح الكروت بناءً على طول مصفوفة المحاضرات النشطة
                if (i <= activeLectures.length) {
                    const data = activeLectures[i - 1]; 
                    const title = globalLang === 'ar' ? data.titleAr : data.titleEn;
                    const desc = globalLang === 'ar' ? data.descAr : data.descEn;
                    const btnText = globalLang === 'ar' ? 'دخول للمحاضرة' : 'Enter Lecture';

                    card.className = 'lec-card active-card';
                    card.onclick = () => window.location.href = data.link;
                    card.innerHTML = `
                        <div class="floating-icon">${i}</div>
                        <h3>${title}</h3>
                        <p>${desc}</p>
                        <a href="${data.link}" class="btn-glass" onclick="event.stopPropagation();">${btnText}</a>
                    `;
                } else {
                    const title = globalLang === 'ar' ? 'المحاضرة ' + i : 'Lecture ' + i;
                    const statusText = globalLang === 'ar' ? 'جاري التجهيز...' : 'Preparing...';

                    card.className = 'lec-card locked-card';
                    card.innerHTML = `
                        <div class="floating-icon">${i}</div>
                        <h3>${title}</h3>
                        <div class="spinner-container">
                            <div class="spinner"><div class="spinnerin"></div></div>
                            <span style="font-weight:bold;" class="locked-status">${statusText}</span>
                        </div>
                    `;
                }
                
                grid.appendChild(card);
            }
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.ondragstart = () => false;
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || e.keyCode === 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'C')) return false;
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 'P')) return false;
        });

        window.onload = initSubPage;
    </script>
</body>
</html>
